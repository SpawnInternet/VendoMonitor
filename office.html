<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spawn Office</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="theme-color" content="#1e3cb8">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#1e3cb8;--blue-light:#eef2ff;--blue-mid:#c7d2fe;
  --green:#16a34a;--green-light:#f0fdf4;--green-mid:#bbf7d0;
  --red:#dc2626;--red-light:#fef2f2;
  --amber:#d97706;--amber-light:#fffbeb;
  --purple:#7c3aed;--purple-light:#f5f3ff;
  --teal:#0d9488;--teal-light:#f0fdfa;
  --gray:#6b7280;--border:#e5e7eb;--bg:#f8fafc;
  --text:#111827;--muted:#6b7280;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);font-size:15px}
.topbar{background:var(--blue);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-logo{font-size:15px;font-weight:700}
.topbar-sub{font-size:10px;opacity:.75;margin-top:1px}
.topbar-logout{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:7px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:none}
.screen{display:none;padding:16px;max-width:700px;margin:0 auto}
.screen.active{display:block}
.card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:16px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.btn{width:100%;padding:14px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:active{opacity:.85}
.btn-gray{background:#f3f4f6;color:var(--muted)}
.btn-sm{padding:7px 14px;font-size:12px;width:auto;border-radius:8px}
.pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;white-space:nowrap}
.pill-blue{background:var(--blue-light);color:var(--blue)}
.pill-green{background:#dcfce7;color:#15803d}
.pill-amber{background:#fef3c7;color:#92400e}
.pill-gray{background:#f3f4f6;color:var(--muted)}
.pill-red{background:#fef2f2;color:var(--red)}
.tabs{display:flex;border-radius:10px;overflow:hidden;border:1.5px solid var(--border);margin-bottom:14px;background:#fff}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:12px;font-weight:700;cursor:pointer;border:none;background:transparent;font-family:inherit;color:var(--muted)}
.tab.active{background:var(--blue);color:#fff}

/* PIN SCREEN */
.pin-wrap{max-width:340px;margin:40px auto 0}
.account-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.account-btn{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;font-family:inherit;transition:.15s}
.account-btn:active{transform:scale(.97)}
.account-btn.selected{border-color:var(--blue);background:var(--blue-light)}
.account-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;margin:0 auto 6px;background:#e0e7ff;color:var(--blue)}
.account-btn.selected .account-av{background:var(--blue);color:#fff}
.account-name{font-size:13px;font-weight:700;color:#1e2d5a}
.account-role{font-size:10px;color:var(--muted);margin-top:2px}
.pin-dots{display:flex;justify-content:center;gap:14px;margin:20px 0 16px}
.pin-dot{width:16px;height:16px;border-radius:50%;background:var(--border);transition:.2s}
.pin-dot.filled{background:var(--blue)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pin-key{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:16px;font-size:22px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;color:var(--text);transition:.1s}
.pin-key:active{background:var(--blue-light);transform:scale(.95)}
.pin-key.del{font-size:16px;color:var(--muted)}
.pin-error{text-align:center;color:var(--red);font-size:13px;font-weight:600;margin-top:10px;min-height:20px}

/* COLLECTOR ROW */
.col-row{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:.15s}
.col-row:active{background:var(--blue-light)}
.col-row.open{border-color:var(--blue);background:var(--blue-light)}
.col-header{display:flex;align-items:center;justify-content:space-between}
.col-av{width:36px;height:36px;border-radius:50%;background:var(--blue-light);color:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.col-info{flex:1;margin-left:12px}
.col-name{font-size:15px;font-weight:700;color:var(--text)}
.col-meta{font-size:11px;color:var(--muted);margin-top:2px}
.col-totals{text-align:right;flex-shrink:0}
.col-total-val{font-size:16px;font-weight:700;color:var(--green)}
.col-total-lbl{font-size:9px;color:var(--muted);margin-top:1px}
.col-detail{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--blue-mid)}
.col-row.open .col-detail{display:block}

/* PACK TABLE */
.pack-table{width:100%;border-collapse:collapse;font-size:12px}
.pack-table th{text-align:left;padding:5px 8px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;border-bottom:1.5px solid var(--border)}
.pack-table td{padding:7px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
.pack-table tr:last-child td{border-bottom:none}
.pack-code{font-size:13px;font-weight:900;color:var(--blue);letter-spacing:.06em;font-family:monospace}
.pack-type-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px}
.pt-mix{background:#fef3c7;color:#92400e}
.pt-peso{background:#dbeafe;color:#1e40af}
.pt-bugi{background:#f3e8ff;color:#6b21a8}
.pt-bills{background:#dcfce7;color:#15803d}

/* VENDO TABLE */
.vendo-row{display:flex;align-items:center;padding:9px 12px;border-bottom:1px solid var(--border);cursor:default}
.vendo-row:last-child{border-bottom:none}
.vendo-code-chip{font-size:12px;font-weight:900;color:#fff;background:var(--blue);border-radius:6px;padding:3px 10px;letter-spacing:.06em;font-family:monospace;flex-shrink:0;min-width:44px;text-align:center}
.vendo-name{flex:1;margin-left:10px;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vendo-area{font-size:10px;color:var(--muted);margin-left:6px;flex-shrink:0}
.vendo-last{font-size:10px;color:var(--muted);margin-left:8px;flex-shrink:0}
.search-bar{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:8px 12px;margin-bottom:10px}
.search-bar input{flex:1;border:none;outline:none;font-size:14px;font-family:inherit;color:var(--text);background:transparent}

/* SUMMARY TOTALS */
.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.sum-card{background:#fff;border-radius:10px;border:1px solid var(--border);padding:12px;text-align:center}
.sum-val{font-size:20px;font-weight:700;color:var(--blue)}
.sum-lbl{font-size:10px;color:var(--muted);margin-top:3px}

/* DATE PICKER */
.date-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.date-row label{font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap}
.date-row input[type=date]{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;outline:none;color:var(--text);flex:1}
.date-row input[type=date]:focus{border-color:var(--blue)}
.refresh-btn{background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;color:var(--blue);cursor:pointer;font-family:inherit;white-space:nowrap}
.refresh-btn:active{background:var(--blue-light)}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:10px;color:var(--muted)}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e3cb8;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:.3s;white-space:nowrap;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1}
.empty-state{text-align:center;padding:32px 16px;color:var(--muted);font-size:13px}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-logo">🏢 Spawn Office</div>
    <div class="topbar-sub" id="topbar-sub">Coin Pack Recount</div>
  </div>
  <button class="topbar-logout" id="logout-btn" onclick="doLogout()">Logout</button>
</div>

<!-- ── SCREEN: LOGIN ── -->
<div class="screen active" id="screen-login">
  <div class="pin-wrap">
    <div class="card" style="margin-bottom:12px;text-align:center;padding:14px">
      <div style="font-size:15px;font-weight:700;color:var(--blue)">Select Account</div>
      <div style="font-size:11px;color:var(--muted);margin-top:3px">then enter your PIN</div>
    </div>
    <div class="account-grid" id="account-grid"></div>
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key" style="opacity:.3" disabled></button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key del" onclick="pinDel()">⌫</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
  </div>
</div>

<!-- ── SCREEN: MAIN ── -->
<div class="screen" id="screen-main">
  <div class="tabs">
    <button class="tab active" id="tab-packs" onclick="switchTab('packs')">📦 Packs</button>
    <button class="tab" id="tab-vendos" onclick="switchTab('vendos')">🖥 Vendos</button>
  </div>

  <!-- DATE + REFRESH -->
  <div class="date-row">
    <label>Date:</label>
    <input type="date" id="date-picker" oninput="loadData()">
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>

  <!-- PACKS TAB -->
  <div id="tab-content-packs">
    <!-- Summary cards -->
    <div class="summary-grid" id="summary-cards">
      <div class="sum-card"><div class="sum-val" id="sum-spawn">₱0</div><div class="sum-lbl">Total spawn share</div></div>
      <div class="sum-card"><div class="sum-val" id="sum-packs">0</div><div class="sum-lbl">Total packs</div></div>
      <div class="sum-card"><div class="sum-val" id="sum-vendos-harvested">0</div><div class="sum-lbl">Vendos harvested</div></div>
    </div>

    <!-- Collectors list -->
    <div id="collectors-list">
      <div class="loading"><div class="spinner"></div><span>Loading…</span></div>
    </div>
  </div>

  <!-- VENDOS TAB -->
  <div id="tab-content-vendos" style="display:none">
    <div class="search-bar">
      <span style="font-size:16px">🔍</span>
      <input type="text" id="vendo-search" placeholder="Search by name, code, area…" oninput="renderVendoTab()">
    </div>
    <div id="vendo-list">
      <div class="loading"><div class="spinner"></div><span>Loading…</span></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB = 'https://cviraqfhphhsonjmrtvu.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2aXJhcWZocGhoc29uam1ydHZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTA5MTY0NTEsImV4cCI6MjAyNjQ5MjQ1MX0.9rSLGHFXHFWELnzxONMGnOzjHIgjwFyMVTnBSWKHSJU';
const HDR = {'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json'};

// ── ACCOUNTS — loaded from office_accounts table ──
let ACCOUNTS = [];

async function loadAccounts(){
  try{
    const r = await fetch(`${SB}/rest/v1/office_accounts?active=eq.true&select=id,name,pin,role&order=name.asc`,{headers:HDR});
    const rows = await r.json();
    ACCOUNTS = rows.map(a=>({
      id: String(a.id),
      name: a.name,
      role: a.role||'Staff',
      pin: a.pin||'0000',
      initials: a.name.substring(0,2).toUpperCase()
    }));
    renderAccounts();
  }catch(e){
    // Fallback to defaults if DB unreachable
    ACCOUNTS = [
      {id:'1',name:'Gilbert',role:'Staff',pin:'1189',initials:'GI'},
      {id:'2',name:'Ailyn',  role:'Staff',pin:'2274',initials:'AI'},
      {id:'3',name:'Joi',    role:'Staff',pin:'3361',initials:'JO'},
    ];
    renderAccounts();
  }
}

let selectedAccount = null;
let pinBuffer = '';
let currentTab = 'packs';
let allHarvests = [];
let allPackItems = [];
let allVendos = [];

// ── PIN LOGIN ──
function renderAccounts(){
  const grid = document.getElementById('account-grid');
  grid.innerHTML = ACCOUNTS.map(a => `
    <button class="account-btn" id="acct-${a.id}" onclick="selectAccount('${a.id}')">
      <div class="account-av">${a.initials}</div>
      <div class="account-name">${a.name}</div>
      <div class="account-role">${a.role}</div>
    </button>`).join('');
}

function selectAccount(id){
  selectedAccount = ACCOUNTS.find(a => a.id === id);
  document.querySelectorAll('.account-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('acct-'+id).classList.add('selected');
  pinBuffer = '';
  updateDots();
  document.getElementById('pin-error').textContent = '';
}

function pinKey(k){
  if(!selectedAccount){ toast('Select an account first'); return; }
  if(pinBuffer.length >= 4) return;
  pinBuffer += k;
  updateDots();
  if(pinBuffer.length === 4) setTimeout(checkPin, 150);
}

function pinDel(){
  pinBuffer = pinBuffer.slice(0,-1);
  updateDots();
  document.getElementById('pin-error').textContent = '';
}

function updateDots(){
  for(let i=0;i<4;i++){
    document.getElementById('d'+i).classList.toggle('filled', i < pinBuffer.length);
  }
}

function checkPin(){
  if(!selectedAccount) return;
  if(pinBuffer === selectedAccount.pin){
    document.getElementById('topbar-sub').textContent = selectedAccount.name + ' — ' + selectedAccount.role;
    document.getElementById('logout-btn').style.display = 'block';
    showScreen('screen-main');
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('date-picker').value = today;
    loadData();
  } else {
    document.getElementById('pin-error').textContent = 'Wrong PIN — try again';
    pinBuffer = '';
    updateDots();
  }
}

function doLogout(){
  selectedAccount = null; pinBuffer = '';
  document.querySelectorAll('.account-btn').forEach(b => b.classList.remove('selected'));
  updateDots();
  document.getElementById('pin-error').textContent = '';
  document.getElementById('topbar-sub').textContent = 'Coin Pack Recount';
  document.getElementById('logout-btn').style.display = 'none';
  showScreen('screen-login');
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// ── TABS ──
function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('tab-content-packs').style.display = tab === 'packs' ? 'block' : 'none';
  document.getElementById('tab-content-vendos').style.display = tab === 'vendos' ? 'block' : 'none';
  if(tab === 'vendos' && allVendos.length === 0) loadVendos();
}

// ── DATA LOAD ──
async function loadData(){
  const date = document.getElementById('date-picker').value;
  if(!date) return;
  document.getElementById('collectors-list').innerHTML = '<div class="loading"><div class="spinner"></div><span>Loading…</span></div>';

  try {
    // Fetch harvests for date
    const hResp = await fetch(`${SB}/rest/v1/harvests?harvest_date=eq.${date}&select=id,collector,vendo_id,vendo_name,tg_name,area,coins_total,spawn_share,net_collectible,harvested_at&order=harvested_at.desc`,{headers:HDR});
    allHarvests = await hResp.json();

    // Fetch pack items for date
    const pResp = await fetch(`${SB}/rest/v1/harvest_pack_items?harvest_date=eq.${date}&select=*&order=created_at.asc`,{headers:HDR});
    allPackItems = await pResp.json();

    renderPacksTab();
  } catch(e){
    document.getElementById('collectors-list').innerHTML = '<div class="empty-state">Error loading data</div>';
    console.error(e);
  }
}

async function loadVendos(){
  document.getElementById('vendo-list').innerHTML = '<div class="loading"><div class="spinner"></div><span>Loading…</span></div>';
  try {
    const resp = await fetch(`${SB}/rest/v1/vendos?select=id,sheet_name,tg_name,area,vendo_code,last_harvest_date&order=area.asc,sheet_name.asc&limit=2000`,{headers:HDR});
    allVendos = await resp.json();
    renderVendoTab();
  } catch(e){
    document.getElementById('vendo-list').innerHTML = '<div class="empty-state">Error loading vendos</div>';
  }
}

// ── RENDER PACKS TAB ──
function renderPacksTab(){
  // Group harvests by collector
  const byCollector = {};
  for(const h of allHarvests){
    const c = h.collector || 'Unknown';
    if(!byCollector[c]) byCollector[c] = {harvests:[], packs:[]};
    byCollector[c].harvests.push(h);
  }
  for(const p of allPackItems){
    const c = p.collector || 'Unknown';
    if(!byCollector[c]) byCollector[c] = {harvests:[], packs:[]};
    byCollector[c].packs.push(p);
  }

  // Summary totals
  const totalSpawn = allHarvests.reduce((s,h) => s + parseFloat(h.spawn_share||0), 0);
  const totalPacks = allPackItems.length;
  const totalVendos = allHarvests.length;
  document.getElementById('sum-spawn').textContent = '₱'+fmt(totalSpawn);
  document.getElementById('sum-packs').textContent = totalPacks;
  document.getElementById('sum-vendos-harvested').textContent = totalVendos;

  if(Object.keys(byCollector).length === 0){
    document.getElementById('collectors-list').innerHTML = '<div class="empty-state">No harvests recorded for this date</div>';
    return;
  }

  let html = '';
  for(const [cname, data] of Object.entries(byCollector)){
    const collSpawn = data.harvests.reduce((s,h) => s + parseFloat(h.spawn_share||0), 0);
    const collPacks = data.packs.length;
    const initials = cname.substring(0,2).toUpperCase();

    // Group packs by vendo_code for this collector
    const packsByVendo = {};
    for(const p of data.packs){
      const key = p.vendo_code || '—';
      if(!packsByVendo[key]) packsByVendo[key] = [];
      packsByVendo[key].push(p);
    }

    // Pack rows
    let packTableRows = '';
    let packRowCount = 0;
    // Also include harvests with no pack items (show as pending)
    const harvestCodes = new Set(data.harvests.map(h => (h.vendo_code||'').toUpperCase()).filter(Boolean));
    const packCodes = new Set(Object.keys(packsByVendo));

    for(const [vcode, packs] of Object.entries(packsByVendo)){
      const totalAmt = packs.reduce((s,p) => s + parseFloat(p.amount||0), 0);
      for(const p of packs){
        packRowCount++;
        const typeLabel = {mix:'Mix 1k', peso:'Peso 300', bugi:'Bugi', bills:'Bills'}[p.pack_type] || p.pack_type;
        const typeCls = {mix:'pt-mix', peso:'pt-peso', bugi:'pt-bugi', bills:'pt-bills'}[p.pack_type] || 'pt-mix';
        const vendoName = data.harvests.find(h => h.vendo_code === vcode || (h.tg_name||'').toUpperCase() === vcode)?.vendo_name || '';
        packTableRows += `
          <tr>
            <td><span class="pack-code">${vcode}</span></td>
            <td style="font-size:11px;color:var(--muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${vendoName||p.vendo_id||'—'}</td>
            <td><span class="pack-type-badge ${typeCls}">${typeLabel}</span></td>
            <td style="text-align:right;font-weight:700;color:var(--text)">₱${fmt(parseFloat(p.amount||0))}</td>
          </tr>`;
      }
    }

    // Harvests without pack data
    const harvestsNoPacks = data.harvests.filter(h => {
      const hPacks = data.packs.filter(p => p.harvest_id === h.id);
      return hPacks.length === 0;
    });
    for(const h of harvestsNoPacks){
      packTableRows += `
        <tr>
          <td><span class="pack-code" style="background:var(--amber-light);color:var(--amber)">${(h.vendo_code||'—').toUpperCase()}</span></td>
          <td style="font-size:11px;color:var(--muted)">${h.vendo_name||h.tg_name||'—'}</td>
          <td><span class="pill pill-amber">No packs yet</span></td>
          <td style="text-align:right;font-size:11px;color:var(--muted)">Spawn: ₱${fmt(parseFloat(h.spawn_share||0))}</td>
        </tr>`;
    }

    const overallTotal = data.packs.reduce((s,p) => s + parseFloat(p.amount||0), 0);
    const diff = Math.round(overallTotal - collSpawn);
    const diffBadge = diff === 0 && collPacks > 0
      ? '<span class="pill pill-green">✓ Balanced</span>'
      : diff !== 0 && collPacks > 0
        ? `<span class="pill pill-red">${diff > 0 ? '▲' : '▼'} ₱${fmt(Math.abs(diff))}</span>`
        : '<span class="pill pill-gray">Pending</span>';

    html += `
      <div class="col-row" id="colrow-${cname.replace(/\s/g,'_')}" onclick="toggleCollector(this)">
        <div class="col-header">
          <div class="col-av">${initials}</div>
          <div class="col-info">
            <div class="col-name">${cname}</div>
            <div class="col-meta">${data.harvests.length} vendo${data.harvests.length!==1?'s':''} · ${collPacks} pack${collPacks!==1?'s':''} · ${diffBadge}</div>
          </div>
          <div class="col-totals">
            <div class="col-total-val">₱${fmt(collSpawn)}</div>
            <div class="col-total-lbl">Spawn share</div>
          </div>
        </div>
        <div class="col-detail">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px">
            <div style="font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.04em">Pack breakdown</div>
            <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
              <span class="pill pill-blue">Total packs: ₱${fmt(overallTotal)}</span>
              <span class="pill pill-green">Spawn share: ₱${fmt(collSpawn)}</span>
              ${diff !== 0 ? `<span class="pill pill-red">Gap: ₱${fmt(Math.abs(diff))}</span>` : ''}
            </div>
          </div>
          ${packTableRows ? `
          <div style="overflow-x:auto">
            <table class="pack-table">
              <thead><tr><th>Code</th><th>Vendo</th><th>Type</th><th style="text-align:right">Amount</th></tr></thead>
              <tbody>${packTableRows}</tbody>
            </table>
          </div>` : '<div class="empty-state" style="padding:12px">No pack data yet</div>'}
        </div>
      </div>`;
  }

  document.getElementById('collectors-list').innerHTML = html;
}

function toggleCollector(el){
  el.classList.toggle('open');
}

// ── RENDER VENDO TAB ──
function renderVendoTab(){
  const q = (document.getElementById('vendo-search').value||'').toLowerCase().trim();
  let vendos = allVendos;
  if(q) vendos = vendos.filter(v =>
    (v.sheet_name||'').toLowerCase().includes(q) ||
    (v.tg_name||'').toLowerCase().includes(q) ||
    (v.area||'').toLowerCase().includes(q) ||
    (v.vendo_code||'').toLowerCase().includes(q)
  );

  if(!vendos.length){
    document.getElementById('vendo-list').innerHTML = '<div class="empty-state">No vendos found</div>';
    return;
  }

  // Group by area
  const byArea = {};
  for(const v of vendos){
    const a = v.area || 'Unknown';
    if(!byArea[a]) byArea[a] = [];
    byArea[a].push(v);
  }

  let html = '';
  for(const [area, vs] of Object.entries(byArea)){
    html += `<div class="card" style="padding:0;overflow:hidden;margin-bottom:12px">
      <div style="padding:10px 14px;background:var(--blue-light);border-bottom:1px solid var(--blue-mid)">
        <span style="font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.05em">${area}</span>
        <span style="font-size:10px;color:var(--muted);margin-left:6px">${vs.length} vendos</span>
      </div>`;
    for(const v of vs){
      const code = v.vendo_code ? v.vendo_code.toUpperCase() : '—';
      const lastHarvest = v.last_harvest_date ? v.last_harvest_date : 'Never';
      html += `<div class="vendo-row">
        <span class="vendo-code-chip">${code}</span>
        <span class="vendo-name" title="${v.sheet_name||v.tg_name||'—'}">${v.sheet_name||v.tg_name||'—'}</span>
        <span class="vendo-area">${v.area||''}</span>
        <span class="vendo-last">${lastHarvest}</span>
      </div>`;
    }
    html += '</div>';
  }

  document.getElementById('vendo-list').innerHTML = html;
}

// ── UTILS ──
function fmt(n){ return isNaN(n) ? '0' : Number(n).toLocaleString('en-PH',{maximumFractionDigits:2}); }

function toast(msg, dur=2200){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ── INIT ──
loadAccounts();
</script>
</body>
</html>
