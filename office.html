<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spawn Count</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="theme-color" content="#1e3cb8">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#1e3cb8;--blue-light:#eef2ff;
  --green:#16a34a;--green-light:#f0fdf4;--green-mid:#bbf7d0;
  --red:#dc2626;--red-light:#fef2f2;
  --amber:#d97706;--amber-light:#fffbeb;
  --purple:#7c3aed;--purple-light:#f5f3ff;
  --gray:#6b7280;--border:#e5e7eb;--bg:#f8fafc;
  --text:#111827;--muted:#6b7280;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);font-size:15px}

/* TOPBAR */
.topbar{background:var(--blue);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.topbar-left{display:flex;flex-direction:column}
.topbar-logo{font-size:15px;font-weight:800;letter-spacing:.02em}
.topbar-sub{font-size:10px;opacity:.7;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.topbar-user{background:rgba(255,255,255,.15);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;display:none}
.btn-logout{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:7px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:none}

/* SCREENS */
.screen{display:none;padding:16px;max-width:720px;margin:0 auto}
.screen.active{display:block}

/* PIN SCREEN */
.pin-wrap{max-width:320px;margin:32px auto 0}
.pin-header{text-align:center;margin-bottom:24px}
.pin-header h1{font-size:22px;font-weight:800;color:var(--blue)}
.pin-header p{font-size:12px;color:var(--muted);margin-top:4px}
.pin-accounts{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:20px}
.pin-acc-btn{padding:8px 16px;border-radius:20px;border:2px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text);transition:.15s}
.pin-acc-btn.selected{border-color:var(--blue);background:var(--blue-light);color:var(--blue)}
.pin-dots{display:flex;justify-content:center;gap:12px;margin:16px 0 14px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--border);transition:.2s}
.pin-dot.filled{background:var(--blue)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pin-key{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:16px;font-size:22px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;color:var(--text);transition:.1s}
.pin-key:active{background:var(--blue-light);transform:scale(.95)}
.pin-key.del{font-size:16px;color:var(--muted)}
.pin-error{text-align:center;color:var(--red);font-size:13px;font-weight:600;margin-top:10px;min-height:20px}

/* DATE BAR */
.date-bar{background:#fff;border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:53px;z-index:90}
.date-bar input[type=date]{border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-size:13px;font-family:inherit;outline:none;color:var(--text)}
.date-bar input[type=date]:focus{border-color:var(--blue)}
.btn-load{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.summary-bar{margin-left:auto;display:flex;gap:14px;align-items:center}
.sum-item{text-align:right}
.sum-label{font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase}
.sum-val{font-size:14px;font-weight:800;color:var(--text)}
.sum-val.green{color:var(--green)}
.sum-val.red{color:var(--red)}
.sum-val.amber{color:var(--amber)}

/* COLLECTOR SECTION */
.collector-block{background:#fff;border-radius:12px;border:1px solid var(--border);margin-bottom:14px;overflow:hidden}
.collector-header{background:var(--blue);color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.collector-name{font-size:14px;font-weight:800}
.collector-stats{font-size:11px;opacity:.85;display:flex;gap:12px}
.collector-total{font-size:13px;font-weight:700}

/* VENDO ROW */
.vendo-row{border-bottom:1px solid var(--border);padding:10px 14px}
.vendo-row:last-child{border-bottom:none}
.vendo-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.vendo-name{font-size:13px;font-weight:700;color:var(--text)}
.vendo-area{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase}
.vendo-recorded{font-size:12px;color:var(--muted)}
.vendo-recorded span{font-weight:700;color:var(--text)}

/* PACK INPUTS */
.pack-inputs{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:8px}
.pack-field{flex:1;min-width:120px}
.pack-field label{display:block;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.pack-field .pack-hint{font-size:9px;color:var(--muted);margin-bottom:4px}
.pack-input-wrap{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;background:#fff}
.pack-input-wrap:focus-within{border-color:var(--blue)}
.pack-prefix{padding:0 8px;font-size:11px;font-weight:700;color:#fff;height:36px;display:flex;align-items:center}
.pack-prefix.p1000{background:var(--blue)}
.pack-prefix.p300{background:var(--purple)}
.pack-input-wrap input{border:none;outline:none;padding:0 8px;width:60px;font-size:15px;font-weight:700;font-family:inherit;color:var(--text);height:36px;background:transparent}
.pack-sub{font-size:10px;color:var(--muted);margin-top:3px;text-align:center}

/* DEFICIT ROW */
.deficit-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:4px}
.deficit-chip{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.chip-recorded{background:var(--blue-light);color:var(--blue)}
.chip-counted{background:var(--green-light);color:var(--green)}
.chip-ok{background:var(--green-light);color:var(--green)}
.chip-deficit{background:var(--red-light);color:var(--red)}
.chip-surplus{background:var(--amber-light);color:var(--amber)}
.chip-pending{background:#f3f4f6;color:var(--gray)}
.btn-save{padding:6px 14px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--green);color:#fff;transition:.15s}
.btn-save:active{transform:scale(.97)}
.btn-save.saved{background:var(--green-light);color:var(--green);border:1px solid var(--green-mid)}

/* EMPTY / LOADING */
.empty-state{text-align:center;padding:48px 16px;color:var(--muted);font-size:13px}
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:40px;color:var(--muted);font-size:13px}
.spinner{width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:.25s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:480px){
  .summary-bar{display:none}
  .pack-inputs{gap:6px}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">🪙 Spawn Count</div>
    <div class="topbar-sub">Pack Counter · Office</div>
  </div>
  <div class="topbar-right">
    <div class="topbar-user" id="topbar-user"></div>
    <button class="btn-logout" id="btn-logout" onclick="doLogout()">Logout</button>
  </div>
</div>

<!-- PIN SCREEN -->
<div class="screen active" id="screen-pin">
  <div class="pin-wrap">
    <div class="pin-header">
      <h1>Spawn Count</h1>
      <p>Select your name then enter PIN</p>
    </div>
    <div class="pin-accounts" id="pin-accounts">
      <div class="loading"><div class="spinner"></div></div>
    </div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key del" onclick="pinKey('del')">⌫</button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key del" onclick="pinKey('clr')">✕</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
  </div>
</div>

<!-- MAIN SCREEN -->
<div class="screen" id="screen-main">
  <!-- Date bar -->
  <div class="date-bar">
    <input type="date" id="date-picker">
    <button class="btn-load" onclick="loadData()">Load</button>
    <div class="summary-bar" id="summary-bar"></div>
  </div>
  <!-- Content -->
  <div style="padding:14px 0" id="collectors-list">
    <div class="empty-state">Select a date and tap Load</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const SB  = 'https://cviraqfhphhsonjmrtvu.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2aXJhcWZocGhoc29uam1ydHZ1Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTY5NjYxOSwiZXhwIjoyMDkxMjcyNjE5fQ.qLPX_TW2U6W51nbOiotRdjUoofXnoWHi3oNfcIDmsek';
const HDR = {apikey:KEY, Authorization:'Bearer '+KEY, 'Content-Type':'application/json'};

// Pack types
const PACKS = [
  {key:'p1000', label:'₱1,000 pack', value:1000, color:'p1000', hint:'Mix of ₱5 · ₱10 · ₱20'},
  {key:'p300',  label:'₱300 pack',   value:300,  color:'p300',  hint:'All ₱1 coins'},
];

let ACCOUNTS   = [];
let currentUser = null;
let pinBuffer   = '';
let selectedAcc = null;
let allHarvests = [];
let packData    = {}; // {harvest_id: {p1000: N, p300: N, saved: bool}}

// ── PIN ──────────────────────────────────────────────────
async function loadAccounts() {
  try {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 15000);
    const r = await fetch(`${SB}/rest/v1/office_accounts?active=eq.true&select=id,name,pin,role&order=name.asc`, {headers:HDR, signal:ctrl.signal});
    clearTimeout(t);
    const rows = await r.json();
    if (!Array.isArray(rows)) throw new Error('bad response');
    ACCOUNTS = rows.map(a => ({id:String(a.id), name:a.name, pin:a.pin||'0000', role:a.role||'Staff'}));
  } catch(e) {
    ACCOUNTS = [
      {id:'1', name:'Gilbert', pin:'1189', role:'Staff'},
      {id:'2', name:'Ailyn',   pin:'2274', role:'Staff'},
      {id:'3', name:'Joi',     pin:'3361', role:'Staff'},
    ];
  }
  renderAccounts();
}

function renderAccounts() {
  const el = document.getElementById('pin-accounts');
  el.innerHTML = ACCOUNTS.map(a =>
    `<button class="pin-acc-btn" data-id="${a.id}" onclick="selectAcc('${a.id}')">${a.name}</button>`
  ).join('');
}

function selectAcc(id) {
  selectedAcc = ACCOUNTS.find(a => a.id === id);
  pinBuffer = '';
  updateDots();
  document.getElementById('pin-error').textContent = '';
  document.querySelectorAll('.pin-acc-btn').forEach(b => b.classList.toggle('selected', b.dataset.id === id));
}

function pinKey(k) {
  if (!selectedAcc) { document.getElementById('pin-error').textContent = 'Select your name first'; return; }
  if (k === 'del') { pinBuffer = pinBuffer.slice(0,-1); }
  else if (k === 'clr') { pinBuffer = ''; }
  else if (pinBuffer.length < 4) { pinBuffer += k; }
  updateDots();
  document.getElementById('pin-error').textContent = '';
  if (pinBuffer.length === 4) setTimeout(checkPin, 120);
}

function updateDots() {
  for (let i = 0; i < 4; i++)
    document.getElementById('d'+i).classList.toggle('filled', i < pinBuffer.length);
}

function checkPin() {
  if (pinBuffer === selectedAcc.pin) {
    currentUser = selectedAcc;
    document.getElementById('topbar-user').textContent = '👤 ' + currentUser.name;
    document.getElementById('topbar-user').style.display = 'block';
    document.getElementById('btn-logout').style.display = 'block';
    showScreen('main');
    // Default to today
    const today = new Date().toLocaleDateString('en-CA', {timeZone:'Asia/Manila'});
    document.getElementById('date-picker').value = today;
    loadData();
  } else {
    document.getElementById('pin-error').textContent = 'Wrong PIN — try again';
    pinBuffer = '';
    updateDots();
  }
}

function doLogout() {
  currentUser = null; selectedAcc = null; pinBuffer = '';
  allHarvests = []; packData = {};
  document.getElementById('topbar-user').style.display = 'none';
  document.getElementById('btn-logout').style.display = 'none';
  document.getElementById('pin-error').textContent = '';
  document.getElementById('collectors-list').innerHTML = '<div class="empty-state">Select a date and tap Load</div>';
  document.getElementById('summary-bar').innerHTML = '';
  document.querySelectorAll('.pin-acc-btn').forEach(b => b.classList.remove('selected'));
  updateDots();
  showScreen('pin');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

// ── LOAD DATA ────────────────────────────────────────────
async function loadData() {
  const date = document.getElementById('date-picker').value;
  if (!date) return;
  const el = document.getElementById('collectors-list');
  el.innerHTML = '<div class="loading"><div class="spinner"></div><span>Loading…</span></div>';
  packData = {};

  try {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 30000);
    const resp = await fetch(
      `${SB}/rest/v1/harvests?harvest_date=eq.${date}&select=id,collector,vendo_name,tg_name,area,coins_total,net_collectible,spawn_share,harvested_at&order=collector.asc,harvested_at.asc`,
      {headers:HDR, signal:ctrl.signal}
    );
    clearTimeout(t);
    const data = await resp.json();
    if (!Array.isArray(data)) {
      el.innerHTML = '<div class="empty-state">Error loading — invalid response</div>';
      return;
    }
    allHarvests = data;

    // Load existing pack counts for this date
    const ctrl2 = new AbortController();
    const t2 = setTimeout(() => ctrl2.abort(), 30000);
    const pResp = await fetch(
      `${SB}/rest/v1/harvest_pack_items?harvest_date=eq.${date}&select=harvest_id,pack_type,amount`,
      {headers:HDR, signal:ctrl2.signal}
    );
    clearTimeout(t2);
    const pData = await pResp.json();
    if (Array.isArray(pData)) {
      pData.forEach(p => {
        if (!packData[p.harvest_id]) packData[p.harvest_id] = {saved:true};
        // amount = count × pack_value → reverse to get count
        const pack = PACKS.find(pk => pk.key === p.pack_type);
        if (pack) packData[p.harvest_id][p.pack_type] = Math.round(p.amount / pack.value);
      });
    }

    render();
  } catch(e) {
    el.innerHTML = '<div class="empty-state">Error: ' + e.message + '</div>';
  }
}

// ── RENDER ───────────────────────────────────────────────
function render() {
  if (!allHarvests.length) {
    document.getElementById('collectors-list').innerHTML = '<div class="empty-state">No harvests found for this date</div>';
    document.getElementById('summary-bar').innerHTML = '';
    return;
  }

  // Group by collector
  const byCollector = {};
  allHarvests.forEach(h => {
    if (!byCollector[h.collector]) byCollector[h.collector] = [];
    byCollector[h.collector].push(h);
  });

  // Global summary
  let totalRecorded = 0, totalCounted = 0, totalSaved = 0;
  allHarvests.forEach(h => {
    totalRecorded += Number(h.coins_total||0);
    const pd = packData[h.id];
    if (pd) {
      const cnt = calcCounted(pd);
      if (cnt > 0) { totalCounted += cnt; totalSaved++; }
    }
  });
  const totalDeficit = totalCounted > 0 ? totalCounted - totalRecorded : null;

  document.getElementById('summary-bar').innerHTML = `
    <div class="sum-item"><div class="sum-label">Vendos</div><div class="sum-val">${allHarvests.length}</div></div>
    <div class="sum-item"><div class="sum-label">Recorded</div><div class="sum-val">₱${fmt(totalRecorded)}</div></div>
    ${totalCounted > 0 ? `
    <div class="sum-item"><div class="sum-label">Counted</div><div class="sum-val green">₱${fmt(totalCounted)}</div></div>
    <div class="sum-item"><div class="sum-label">Gap</div><div class="sum-val ${totalDeficit < 0 ? 'red' : totalDeficit > 0 ? 'amber' : 'green'}">${totalDeficit >= 0 ? '+' : ''}₱${fmt(totalDeficit)}</div></div>
    ` : ''}
  `;

  const html = Object.entries(byCollector).map(([collector, harvests]) => {
    const colRecorded = harvests.reduce((s,h) => s+Number(h.coins_total||0), 0);
    const colCounted  = harvests.reduce((s,h) => {
      const pd = packData[h.id];
      return s + (pd ? calcCounted(pd) : 0);
    }, 0);
    const colDone = harvests.filter(h => packData[h.id] && calcCounted(packData[h.id]) > 0).length;

    return `
    <div class="collector-block">
      <div class="collector-header">
        <div>
          <div class="collector-name">👤 ${collector}</div>
          <div class="collector-stats">
            <span>${harvests.length} vendos</span>
            <span>${colDone}/${harvests.length} counted</span>
          </div>
        </div>
        <div class="collector-total">
          <div style="font-size:10px;opacity:.8">Recorded</div>
          <div>₱${fmt(colRecorded)}</div>
          ${colCounted > 0 ? `<div style="font-size:10px;opacity:.8;margin-top:4px">Counted</div><div>₱${fmt(colCounted)}</div>` : ''}
        </div>
      </div>
      ${harvests.map(h => renderVendo(h)).join('')}
    </div>`;
  }).join('');

  document.getElementById('collectors-list').innerHTML = html;
}

function renderVendo(h) {
  const pd = packData[h.id] || {};
  const p1000 = pd.p1000 || 0;
  const p300  = pd.p300  || 0;
  const counted = calcCounted(pd);
  const recorded = Number(h.coins_total||0);
  const deficit = counted > 0 ? counted - recorded : null;
  const isSaved = pd.saved && counted > 0;
  const name = h.vendo_name || h.tg_name || '—';

  let defChip = `<span class="deficit-chip chip-pending">Not yet counted</span>`;
  if (counted > 0) {
    if (deficit === 0) defChip = `<span class="deficit-chip chip-ok">✓ Match</span>`;
    else if (deficit < 0) defChip = `<span class="deficit-chip chip-deficit">Deficit ₱${fmt(Math.abs(deficit))}</span>`;
    else defChip = `<span class="deficit-chip chip-surplus">Surplus ₱${fmt(deficit)}</span>`;
  }

  return `
  <div class="vendo-row" id="vrow-${h.id}">
    <div class="vendo-top">
      <div>
        <div class="vendo-name">${name}</div>
        <div class="vendo-area">${h.area||'—'}</div>
      </div>
      <div class="vendo-recorded">Recorded: <span>₱${fmt(recorded)}</span></div>
    </div>
    <div class="pack-inputs">
      <div class="pack-field">
        <label>₱1,000 packs</label>
        <div class="pack-hint">Mix ₱5 · ₱10 · ₱20</div>
        <div class="pack-input-wrap">
          <div class="pack-prefix p1000">×1000</div>
          <input type="number" id="p1000-${h.id}" value="${p1000||''}" min="0" step="1"
            inputmode="numeric" placeholder="0"
            oninput="onPackInput(${h.id})">
        </div>
        <div class="pack-sub" id="sub1000-${h.id}">${p1000 ? '= ₱'+fmt(p1000*1000) : ''}</div>
      </div>
      <div class="pack-field">
        <label>₱300 packs</label>
        <div class="pack-hint">All ₱1 coins</div>
        <div class="pack-input-wrap">
          <div class="pack-prefix p300">×300</div>
          <input type="number" id="p300-${h.id}" value="${p300||''}" min="0" step="1"
            inputmode="numeric" placeholder="0"
            oninput="onPackInput(${h.id})">
        </div>
        <div class="pack-sub" id="sub300-${h.id}">${p300 ? '= ₱'+fmt(p300*300) : ''}</div>
      </div>
    </div>
    <div class="deficit-row">
      ${counted > 0 ? `<span class="deficit-chip chip-recorded">Recorded ₱${fmt(recorded)}</span><span class="deficit-chip chip-counted">Counted ₱${fmt(counted)}</span>` : ''}
      ${defChip}
      <button class="btn-save ${isSaved?'saved':''}" id="btn-${h.id}" onclick="savePacks(${h.id})"
        ${isSaved?'title="Saved — click to update"':''}>
        ${isSaved ? '✓ Saved' : 'Save'}
      </button>
    </div>
  </div>`;
}

function calcCounted(pd) {
  return (Number(pd.p1000||0)*1000) + (Number(pd.p300||0)*300);
}

function fmt(n) {
  if (n === null || n === undefined) return '0';
  return Math.round(Number(n)).toLocaleString('en-PH');
}

function onPackInput(harvestId) {
  const p1000 = parseInt(document.getElementById('p1000-'+harvestId).value)||0;
  const p300  = parseInt(document.getElementById('p300-'+harvestId).value)||0;
  const counted = (p1000*1000) + (p300*300);
  const recorded = Number(allHarvests.find(h=>h.id===harvestId)?.coins_total||0);
  const deficit = counted - recorded;

  // Update sub-labels
  const sub1 = document.getElementById('sub1000-'+harvestId);
  const sub3 = document.getElementById('sub300-'+harvestId);
  if (sub1) sub1.textContent = p1000 ? '= ₱'+fmt(p1000*1000) : '';
  if (sub3) sub3.textContent = p300  ? '= ₱'+fmt(p300*300) : '';

  // Update deficit row live
  const row = document.getElementById('vrow-'+harvestId);
  if (!row) return;
  const defRow = row.querySelector('.deficit-row');
  let defChip = `<span class="deficit-chip chip-pending">Not yet counted</span>`;
  let countedChips = '';
  if (counted > 0) {
    countedChips = `<span class="deficit-chip chip-recorded">Recorded ₱${fmt(recorded)}</span><span class="deficit-chip chip-counted">Counted ₱${fmt(counted)}</span>`;
    if (deficit === 0) defChip = `<span class="deficit-chip chip-ok">✓ Match</span>`;
    else if (deficit < 0) defChip = `<span class="deficit-chip chip-deficit">Deficit ₱${fmt(Math.abs(deficit))}</span>`;
    else defChip = `<span class="deficit-chip chip-surplus">Surplus ₱${fmt(deficit)}</span>`;
  }

  // Preserve save button
  const btn = document.getElementById('btn-'+harvestId);
  const btnHtml = btn ? btn.outerHTML.replace('✓ Saved','Save').replace('saved','') : '';
  defRow.innerHTML = countedChips + defChip + btnHtml;

  // Reattach onclick (innerHTML kills event)
  const newBtn = document.getElementById('btn-'+harvestId);
  if (newBtn) newBtn.onclick = () => savePacks(harvestId);

  // Update in-memory
  if (!packData[harvestId]) packData[harvestId] = {};
  packData[harvestId].p1000 = p1000;
  packData[harvestId].p300  = p300;
  packData[harvestId].saved = false;
}

// ── SAVE ─────────────────────────────────────────────────
async function savePacks(harvestId) {
  const p1000 = parseInt(document.getElementById('p1000-'+harvestId).value)||0;
  const p300  = parseInt(document.getElementById('p300-'+harvestId).value)||0;
  const harvest = allHarvests.find(h => h.id === harvestId);
  if (!harvest) return;

  const date = document.getElementById('date-picker').value;
  const btn = document.getElementById('btn-'+harvestId);
  if (btn) { btn.disabled = true; btn.textContent = '…'; }

  try {
    // Delete existing pack items for this harvest
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 15000);
    await fetch(`${SB}/rest/v1/harvest_pack_items?harvest_id=eq.${harvestId}`, {
      method:'DELETE', headers:{...HDR, Prefer:'return=minimal'}, signal:ctrl.signal
    });
    clearTimeout(t);

    // Insert new pack items (only if count > 0)
    const inserts = [];
    if (p1000 > 0) inserts.push({
      harvest_id: harvestId,
      vendo_id: harvest.vendo_id||null,
      collector: harvest.collector,
      harvest_date: date,
      pack_type: 'p1000',
      amount: p1000 * 1000
    });
    if (p300 > 0) inserts.push({
      harvest_id: harvestId,
      vendo_id: harvest.vendo_id||null,
      collector: harvest.collector,
      harvest_date: date,
      pack_type: 'p300',
      amount: p300 * 300
    });

    if (inserts.length > 0) {
      const ctrl2 = new AbortController();
      const t2 = setTimeout(() => ctrl2.abort(), 15000);
      const r = await fetch(`${SB}/rest/v1/harvest_pack_items`, {
        method:'POST',
        headers:{...HDR, Prefer:'return=minimal'},
        body: JSON.stringify(inserts),
        signal: ctrl2.signal
      });
      clearTimeout(t2);
      if (!r.ok) throw new Error('Save failed: ' + r.status);
    }

    // Update local state
    packData[harvestId] = {p1000, p300, saved:true};
    if (btn) { btn.disabled = false; btn.textContent = '✓ Saved'; btn.classList.add('saved'); }
    toast('✓ Saved — ' + (harvest.vendo_name||harvest.tg_name||'Vendo'));

    // Refresh summary bar
    const totalRecorded = allHarvests.reduce((s,h) => s+Number(h.coins_total||0), 0);
    const totalCounted  = allHarvests.reduce((s,h) => {
      const pd = packData[h.id];
      return s + (pd ? calcCounted(pd) : 0);
    }, 0);
    const totalDeficit = totalCounted > 0 ? totalCounted - totalRecorded : null;
    if (totalCounted > 0) {
      document.getElementById('summary-bar').querySelector?.('.sum-val.green') &&
        (document.getElementById('summary-bar').innerHTML = document.getElementById('summary-bar').innerHTML);
    }

  } catch(e) {
    toast('Error: ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = 'Retry'; }
  }
}

// ── TOAST ─────────────────────────────────────────────────
function toast(msg, dur=2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

// ── INIT ──────────────────────────────────────────────────
loadAccounts();
</script>
