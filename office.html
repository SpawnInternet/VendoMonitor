<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spawn Count</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="theme-color" content="#1e3cb8">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#1e3cb8;--blue-light:#eef2ff;--blue-mid:#c7d2fe;
  --green:#16a34a;--green-light:#f0fdf4;--green-mid:#86efac;
  --red:#dc2626;--red-light:#fef2f2;
  --amber:#d97706;--amber-light:#fffbeb;
  --purple:#7c3aed;--purple-light:#f5f3ff;
  --teal:#0d9488;--teal-light:#f0fdfa;
  --gray:#6b7280;--border:#e5e7eb;--bg:#f1f5f9;
  --text:#111827;--muted:#6b7280;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);font-size:15px}

/* TOPBAR */
.topbar{background:var(--blue);color:#fff;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.tl-title{font-size:15px;font-weight:800}
.tl-sub{font-size:10px;opacity:.65;margin-top:1px}
.tr{display:flex;align-items:center;gap:8px}
.user-chip{background:rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;display:none}
.btn-sm{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);color:#fff;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}

/* SCREENS */
.screen{display:none}
.screen.active{display:block}

/* ── PIN SCREEN ── */
.pin-wrap{max-width:340px;margin:32px auto;padding:0 16px}
.pin-hd{text-align:center;margin-bottom:24px}
.pin-hd h1{font-size:26px;font-weight:900;color:var(--blue)}
.pin-hd p{font-size:12px;color:var(--muted);margin-top:5px}
.pin-accs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:22px}
.acc-btn{padding:10px 20px;border-radius:22px;border:2px solid var(--border);background:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--text);transition:.15s}
.acc-btn.sel{border-color:var(--blue);background:var(--blue-light);color:var(--blue)}
.pin-dots{display:flex;justify-content:center;gap:14px;margin:16px 0 14px}
.pin-dot{width:15px;height:15px;border-radius:50%;background:var(--border);transition:.2s}
.pin-dot.filled{background:var(--blue)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pk{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:16px;font-size:23px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;color:var(--text);transition:.1s}
.pk:active{background:var(--blue-light);transform:scale(.95)}
.pk.del{font-size:16px;color:var(--muted)}
.pin-err{text-align:center;color:var(--red);font-size:13px;font-weight:600;margin-top:12px;min-height:20px}

/* ── COLLECTOR SELECT SCREEN ── */
.home-wrap{max-width:520px;margin:0 auto;padding:20px 14px}
.home-date-row{display:flex;align-items:center;gap:10px;margin-bottom:20px;background:#fff;border-radius:12px;border:1px solid var(--border);padding:12px 14px}
.home-date-lbl{font-size:12px;color:var(--muted);font-weight:600;flex:1}
.home-date-lbl strong{display:block;font-size:16px;font-weight:800;color:var(--text)}
.btn-change-date{font-size:11px;font-weight:700;color:var(--blue);background:var(--blue-light);border:none;border-radius:6px;padding:5px 10px;cursor:pointer;font-family:inherit}
.date-inp-wrap{display:none;margin-top:8px}
.date-inp-wrap input{border:1.5px solid var(--blue);border-radius:8px;padding:7px 10px;font-size:13px;font-family:inherit;outline:none;width:100%}

.section-lbl{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;padding:0 2px}

/* collector cards */
.col-card{background:#fff;border-radius:14px;border:1px solid var(--border);margin-bottom:10px;cursor:pointer;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden}
.col-card:active{transform:scale(.985);box-shadow:none}
.col-card-inner{display:flex;align-items:center;gap:14px;padding:14px}
.col-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#1e3cb8,#2563eb);color:#fff;font-size:16px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.col-info{flex:1}
.col-cname{font-size:15px;font-weight:800;color:var(--text)}
.col-meta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:10px;flex-wrap:wrap}
.col-stats{text-align:right}
.col-spawn{font-size:17px;font-weight:900;color:var(--green)}
.col-spawn-lbl{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase}
.col-progress{height:4px;background:var(--border);border-radius:2px;margin:0}
.col-progress-fill{height:4px;background:var(--green);border-radius:2px;transition:.3s}
.col-card.done .col-avatar{background:linear-gradient(135deg,#16a34a,#22c55e)}

/* no harvests */
.no-harvest{text-align:center;padding:48px 16px;color:var(--muted);font-size:13px}
.no-harvest .icon{font-size:40px;margin-bottom:12px}

/* ── VENDO DETAIL SCREEN ── */
.detail-topbar{background:#fff;border-bottom:2px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:53px;z-index:100}
.btn-back{background:var(--blue-light);border:none;color:var(--blue);border-radius:8px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.detail-col-name{font-size:14px;font-weight:800;color:var(--text);flex:1}
.detail-summary{text-align:right}
.detail-summary .ds-val{font-size:14px;font-weight:800}
.detail-summary .ds-lbl{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase}

.detail-content{max-width:760px;margin:0 auto;padding:14px 12px}

/* expense section */
.exp-card{background:#fff;border-radius:12px;border:1px solid var(--border);margin-bottom:14px;overflow:hidden}
.exp-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;user-select:none}
.exp-hd-title{font-size:12px;font-weight:700;color:var(--purple);display:flex;align-items:center;gap:6px}
.exp-hd-amt{font-size:13px;font-weight:800;color:var(--purple)}
.exp-body{display:none;padding:10px 14px;border-top:1px solid var(--border)}
.exp-body.open{display:block}
.exp-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.exp-item:last-child{border-bottom:none}
.exp-cat{font-size:11px;font-weight:700;color:var(--purple);min-width:65px}
.exp-desc{font-size:12px;color:var(--text);flex:1}
.exp-amt{font-size:13px;font-weight:700;color:var(--red)}
.exp-del{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:0 4px}
.exp-add-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.exp-select,.exp-inp{border:1.5px solid var(--border);border-radius:7px;padding:7px 9px;font-size:12px;font-family:inherit;outline:none;background:#fff}
.exp-select:focus,.exp-inp:focus{border-color:var(--purple)}
.exp-inp{flex:1;min-width:80px}
.btn-add-exp{background:var(--purple);color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}

/* vendo block */
.vendo-block{background:#fff;border-radius:14px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.vendo-hd{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.vhd-left .vname{font-size:14px;font-weight:800;color:var(--text)}
.vhd-left .varea{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;margin-top:2px}
.vhd-right{text-align:right}
.v-coins-total{font-size:11px;color:var(--muted)}
.v-coins-total span{font-weight:700;color:var(--text)}
.v-spawn{font-size:11px;color:var(--green);font-weight:700;text-transform:uppercase;margin-top:2px}
.v-spawn span{font-size:18px;font-weight:900;color:var(--green);display:block}

.suggest-bar{background:var(--green-light);border-bottom:1px solid var(--green-mid);padding:7px 14px;font-size:11px;color:var(--green);font-weight:600}

.vendo-body{padding:12px 14px}

/* pack grid */
.pack-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.pack-field{background:var(--bg);border-radius:10px;padding:9px 10px}
.pack-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.pack-label.mix{color:var(--blue)}
.pack-label.peso{color:var(--purple)}
.pack-label.bugi{color:var(--teal)}
.pack-label.bills{color:var(--amber)}
.pack-hint{font-size:9px;color:var(--muted);margin-bottom:6px}
.pack-counter{display:flex;align-items:center;gap:6px}
.pc-btn{width:32px;height:32px;border-radius:50%;border:none;font-size:20px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.1s}
.pc-btn:active{transform:scale(.88)}
.pc-btn.mix{background:var(--blue);color:#fff}
.pc-btn.peso{background:var(--purple);color:#fff}
.pc-count{font-size:20px;font-weight:800;min-width:32px;text-align:center}
.pc-total{font-size:11px;font-weight:700;border-radius:6px;padding:2px 7px;margin-left:auto;white-space:nowrap}
.pc-total.mix{background:var(--blue-light);color:var(--blue)}
.pc-total.peso{background:var(--purple-light);color:var(--purple)}
.amt-inp{border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-size:15px;font-weight:700;font-family:inherit;width:100%;outline:none;background:#fff}
.amt-inp:focus{border-color:var(--blue)}
.amt-lbl{font-size:11px;font-weight:700;margin-top:4px}
.amt-lbl.bugi{color:var(--teal)}
.amt-lbl.bills{color:var(--amber)}

/* deficit strip */
.def-strip{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dchip{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.dchip.spawn{background:var(--green-light);color:var(--green);border:1px solid var(--green-mid)}
.dchip.counted{background:var(--blue-light);color:var(--blue)}
.dchip.match{background:var(--green-light);color:var(--green)}
.dchip.deficit{background:var(--red-light);color:var(--red)}
.dchip.surplus{background:var(--amber-light);color:var(--amber)}
.dchip.pending{background:#f3f4f6;color:var(--gray)}
.btn-save{padding:7px 16px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--green);color:#fff;margin-left:auto;transition:.15s;white-space:nowrap;flex-shrink:0}
.btn-save:active{transform:scale(.96)}
.btn-save.saved{background:var(--green-light);color:var(--green);border:1.5px solid var(--green-mid)}
.btn-save:disabled{opacity:.5}

/* loading/empty */
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:48px;color:var(--muted);font-size:13px}
.spinner{width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 16px;color:var(--muted);font-size:13px}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:#1e293b;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:.25s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:480px){.pack-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div>
    <div class="tl-title">🪙 Spawn Count</div>
    <div class="tl-sub" id="topbar-sub">Pack Counter · Office</div>
  </div>
  <div class="tr">
    <div class="user-chip" id="user-chip"></div>
    <button class="btn-sm" id="btn-logout" style="display:none" onclick="doLogout()">Logout</button>
  </div>
</div>

<!-- SCREEN: PIN -->
<div class="screen active" id="screen-pin">
  <div class="pin-wrap">
    <div class="pin-hd">
      <h1>🪙 Spawn Count</h1>
      <p>Select your name then enter PIN</p>
    </div>
    <div class="pin-accs" id="pin-accs">
      <div class="loading"><div class="spinner"></div></div>
    </div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-pad">
      <button class="pk" onclick="pinKey('1')">1</button>
      <button class="pk" onclick="pinKey('2')">2</button>
      <button class="pk" onclick="pinKey('3')">3</button>
      <button class="pk" onclick="pinKey('4')">4</button>
      <button class="pk" onclick="pinKey('5')">5</button>
      <button class="pk" onclick="pinKey('6')">6</button>
      <button class="pk" onclick="pinKey('7')">7</button>
      <button class="pk" onclick="pinKey('8')">8</button>
      <button class="pk" onclick="pinKey('9')">9</button>
      <button class="pk del" onclick="pinKey('del')">⌫</button>
      <button class="pk" onclick="pinKey('0')">0</button>
      <button class="pk del" onclick="pinKey('clr')">✕</button>
    </div>
    <div class="pin-err" id="pin-err"></div>
  </div>
</div>

<!-- SCREEN: COLLECTOR SELECT -->
<div class="screen" id="screen-home">
  <div class="home-wrap">
    <div class="home-date-row">
      <div class="home-date-lbl">
        Harvests for
        <strong id="home-date-display"></strong>
      </div>
      <button class="btn-change-date" onclick="toggleDatePicker()">Change Date</button>
      <div class="date-inp-wrap" id="date-inp-wrap">
        <input type="date" id="date-picker" onchange="onDateChange()">
      </div>
    </div>
    <div class="section-lbl">Select Collector</div>
    <div id="collector-cards">
      <div class="loading"><div class="spinner"></div><span>Loading…</span></div>
    </div>
  </div>
</div>

<!-- SCREEN: VENDO DETAIL -->
<div class="screen" id="screen-detail">
  <div class="detail-topbar">
    <button class="btn-back" onclick="goHome()">← Back</button>
    <div class="detail-col-name" id="detail-col-name"></div>
    <div class="detail-summary" id="detail-summary"></div>
  </div>
  <div class="detail-content" id="detail-content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB  = 'https://cviraqfhphhsonjmrtvu.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2aXJhcWZocGhoc29uam1ydHZ1Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTY5NjYxOSwiZXhwIjoyMDkxMjcyNjE5fQ.qLPX_TW2U6W51nbOiotRdjUoofXnoWHi3oNfcIDmsek';
const HDR = {apikey:KEY, Authorization:'Bearer '+KEY, 'Content-Type':'application/json'};
const EXP_CATS = ['Fuel','Food','Parking','Repair','Load','Other'];

let ACCOUNTS    = [];
let currentUser = null;
let pinBuffer   = '';
let selectedAcc = null;
let currentDate = '';
let allHarvests = [];   // all harvests for selected date
let packState   = {};   // {harvest_id: {mix,peso,bugi,bills}}
let expState    = {};   // {collector: [{cat,desc,amt,id}]}
let savedSet    = new Set();
let activeCollector = null;

// ── UTILS ────────────────────────────────────────────────
function fmt(n){ return Math.round(Number(n||0)).toLocaleString('en-PH'); }
function today(){ return new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'}); }
function fmtDate(d){ return new Date(d+'T12:00:00').toLocaleDateString('en-PH',{weekday:'long',month:'long',day:'numeric',year:'numeric'}); }
function toast(msg,dur=2500){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),dur); }
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById('screen-'+id).classList.add('active'); }

async function sbFetch(path){
  const ctrl=new AbortController(), t=setTimeout(()=>ctrl.abort(),30000);
  const r=await fetch(`${SB}/rest/v1/${path}`,{headers:HDR,signal:ctrl.signal});
  clearTimeout(t); return r.json();
}
async function sbDelete(path){
  const ctrl=new AbortController(), t=setTimeout(()=>ctrl.abort(),15000);
  await fetch(`${SB}/rest/v1/${path}`,{method:'DELETE',headers:{...HDR,Prefer:'return=minimal'},signal:ctrl.signal});
  clearTimeout(t);
}

// ── PIN ──────────────────────────────────────────────────
async function loadAccounts(){
  try{
    const ctrl=new AbortController(), t=setTimeout(()=>ctrl.abort(),12000);
    const r=await fetch(`${SB}/rest/v1/office_accounts?active=eq.true&select=id,name,pin,role&order=name.asc`,{headers:HDR,signal:ctrl.signal});
    clearTimeout(t);
    const rows=await r.json();
    if(!Array.isArray(rows)) throw new Error();
    ACCOUNTS=rows.map(a=>({id:String(a.id),name:a.name,pin:a.pin||'0000',role:a.role||'Staff'}));
  }catch{
    ACCOUNTS=[{id:'1',name:'Gilbert',pin:'1189'},{id:'2',name:'Ailyn',pin:'2274'},{id:'3',name:'Joi',pin:'3361'}];
  }
  document.getElementById('pin-accs').innerHTML=ACCOUNTS.map(a=>
    `<button class="acc-btn" data-id="${a.id}" onclick="selectAcc('${a.id}')">${a.name}</button>`
  ).join('');
}

function selectAcc(id){
  selectedAcc=ACCOUNTS.find(a=>a.id===id);
  pinBuffer=''; updateDots();
  document.getElementById('pin-err').textContent='';
  document.querySelectorAll('.acc-btn').forEach(b=>b.classList.toggle('sel',b.dataset.id===id));
}

function pinKey(k){
  if(!selectedAcc){document.getElementById('pin-err').textContent='Select your name first';return;}
  if(k==='del') pinBuffer=pinBuffer.slice(0,-1);
  else if(k==='clr') pinBuffer='';
  else if(pinBuffer.length<4) pinBuffer+=k;
  updateDots();
  document.getElementById('pin-err').textContent='';
  if(pinBuffer.length===4) setTimeout(checkPin,120);
}

function updateDots(){
  for(let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('filled',i<pinBuffer.length);
}

function checkPin(){
  if(pinBuffer===selectedAcc.pin){
    currentUser=selectedAcc;
    document.getElementById('user-chip').textContent='👤 '+currentUser.name;
    document.getElementById('user-chip').style.display='block';
    document.getElementById('btn-logout').style.display='block';
    document.getElementById('topbar-sub').textContent='Pack Counter · Office';
    showScreen('home');
    currentDate=today();
    loadHome();
  } else {
    document.getElementById('pin-err').textContent='Wrong PIN — try again';
    pinBuffer=''; updateDots();
  }
}

function doLogout(){
  currentUser=null; selectedAcc=null; pinBuffer='';
  allHarvests=[]; packState={}; expState={}; savedSet=new Set(); activeCollector=null;
  document.getElementById('user-chip').style.display='none';
  document.getElementById('btn-logout').style.display='none';
  document.getElementById('pin-err').textContent='';
  document.querySelectorAll('.acc-btn').forEach(b=>b.classList.remove('sel'));
  updateDots();
  showScreen('pin');
}

// ── HOME: COLLECTOR CARDS ────────────────────────────────
async function loadHome(){
  document.getElementById('home-date-display').textContent = fmtDate(currentDate);
  document.getElementById('date-picker').value = currentDate;
  const el=document.getElementById('collector-cards');
  el.innerHTML='<div class="loading"><div class="spinner"></div><span>Loading…</span></div>';
  packState={}; expState={}; savedSet=new Set(); allHarvests=[];

  try{
    // Load harvests
    const h=await sbFetch(`harvests?harvest_date=eq.${currentDate}&select=id,collector,vendo_name,tg_name,sheet_name,route_code,area,coins_total,net_collectible,spawn_share,harvested_at&order=collector.asc,harvested_at.asc`);
    if(!Array.isArray(h)){el.innerHTML='<div class="empty">Error loading data</div>';return;}
    allHarvests=h;

    if(!allHarvests.length){
      el.innerHTML=`<div class="no-harvest"><div class="icon">🌙</div>No harvests recorded<br>for this date</div>`;
      return;
    }

    // Load pack items
    const p=await sbFetch(`harvest_pack_items?harvest_date=eq.${currentDate}&select=harvest_id,pack_type,amount`);
    if(Array.isArray(p)) p.forEach(pk=>{
      if(!packState[pk.harvest_id]) packState[pk.harvest_id]={mix:0,peso:0,bugi:0,bills:0};
      if(pk.pack_type==='mix')   packState[pk.harvest_id].mix  =(packState[pk.harvest_id].mix||0)+Number(pk.amount)/1000;
      if(pk.pack_type==='peso')  packState[pk.harvest_id].peso =(packState[pk.harvest_id].peso||0)+Number(pk.amount)/300;
      if(pk.pack_type==='bugi')  packState[pk.harvest_id].bugi =(packState[pk.harvest_id].bugi||0)+Number(pk.amount);
      if(pk.pack_type==='bills') packState[pk.harvest_id].bills=(packState[pk.harvest_id].bills||0)+Number(pk.amount);
      savedSet.add(pk.harvest_id);
    });

    // Load expenses
    const ex=await sbFetch(`collector_expenses?expense_date=eq.${currentDate}&select=id,collector,category,description,amount&order=created_at.asc`);
    if(Array.isArray(ex)) ex.forEach(e=>{
      if(!expState[e.collector]) expState[e.collector]=[];
      expState[e.collector].push({id:e.id,cat:e.category,desc:e.description||'',amt:Number(e.amount)});
    });

    renderCollectorCards();
  }catch(e){
    el.innerHTML='<div class="empty">Error: '+e.message+'</div>';
  }
}

function renderCollectorCards(){
  // Group by collector
  const byCol={};
  allHarvests.forEach(h=>{
    if(!byCol[h.collector]) byCol[h.collector]=[];
    byCol[h.collector].push(h);
  });

  const html=Object.entries(byCol).map(([col,harvests])=>{
    const totalSpawn = harvests.reduce((s,h)=>s+Number(h.spawn_share||0),0);
    const totalCoins = harvests.reduce((s,h)=>s+Number(h.coins_total||0),0);
    const counted    = harvests.reduce((s,h)=>{ const ps=packState[h.id]; return s+(ps?calcCounted(ps):0); },0);
    const savedCount = harvests.filter(h=>savedSet.has(h.id)).length;
    const allSaved   = savedCount===harvests.length;
    const expTotal   = (expState[col]||[]).reduce((s,e)=>s+e.amt,0);
    const pct        = savedCount/harvests.length*100;
    const initials   = col.substring(0,2).toUpperCase();
    const gap        = counted>0 ? counted-totalSpawn : null;

    let gapBadge='';
    if(gap!==null){
      if(gap===0) gapBadge=`<span style="background:var(--green-light);color:var(--green);font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px">✓ Match</span>`;
      else if(gap<0) gapBadge=`<span style="background:var(--red-light);color:var(--red);font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px">Deficit ₱${fmt(Math.abs(gap))}</span>`;
      else gapBadge=`<span style="background:var(--amber-light);color:var(--amber);font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px">Surplus ₱${fmt(gap)}</span>`;
    }

    return `
    <div class="col-card ${allSaved?'done':''}" onclick="openCollector('${col}')">
      <div class="col-card-inner">
        <div class="col-avatar">${initials}</div>
        <div class="col-info">
          <div class="col-cname">${col}${gapBadge}</div>
          <div class="col-meta">
            <span>📦 ${harvests.length} vendos</span>
            <span>✓ ${savedCount}/${harvests.length} counted</span>
            ${expTotal>0?`<span>💸 ₱${fmt(expTotal)}</span>`:''}
          </div>
        </div>
        <div class="col-stats">
          <div class="col-spawn-lbl">Spawn Share</div>
          <div class="col-spawn">₱${fmt(totalSpawn)}</div>
          ${counted>0?`<div style="font-size:10px;color:var(--blue);font-weight:700;margin-top:2px">Counted ₱${fmt(counted)}</div>`:''}
        </div>
      </div>
      <div class="col-progress">
        <div class="col-progress-fill" style="width:${pct}%"></div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('collector-cards').innerHTML=html;
}

function toggleDatePicker(){
  const w=document.getElementById('date-inp-wrap');
  w.style.display=w.style.display==='block'?'none':'block';
}
function onDateChange(){
  currentDate=document.getElementById('date-picker').value;
  document.getElementById('date-inp-wrap').style.display='none';
  loadHome();
}

// ── DETAIL: VENDOS FOR COLLECTOR ─────────────────────────
function openCollector(collector){
  activeCollector=collector;
  const harvests=allHarvests.filter(h=>h.collector===collector);
  document.getElementById('detail-col-name').textContent='👤 '+collector;
  renderDetailSummary(harvests);
  document.getElementById('detail-content').innerHTML=renderExpenseCard(collector)+harvests.map(h=>renderVendo(h)).join('');
  showScreen('detail');
}

function goHome(){
  activeCollector=null;
  showScreen('home');
  renderCollectorCards(); // refresh cards with latest counts
}

function renderDetailSummary(harvests){
  const totalSpawn=harvests.reduce((s,h)=>s+Number(h.spawn_share||0),0);
  const totalCounted=harvests.reduce((s,h)=>{ const ps=packState[h.id]; return s+(ps?calcCounted(ps):0); },0);
  const saved=harvests.filter(h=>savedSet.has(h.id)).length;
  document.getElementById('detail-summary').innerHTML=`
    <div class="ds-lbl">Spawn Share</div>
    <div class="ds-val" style="color:var(--green)">₱${fmt(totalSpawn)}</div>
    ${totalCounted>0?`<div class="ds-lbl" style="margin-top:2px">Counted</div><div class="ds-val" style="color:var(--blue)">₱${fmt(totalCounted)}</div>`:''}
    <div style="font-size:10px;color:var(--muted);margin-top:2px">${saved}/${harvests.length} saved</div>
  `;
}

// ── EXPENSE CARD ─────────────────────────────────────────
function renderExpenseCard(collector){
  const exps=expState[collector]||[];
  const total=exps.reduce((s,e)=>s+e.amt,0);
  return `
  <div class="exp-card" id="exp-card-${collector}">
    <div class="exp-hd" onclick="toggleExpPanel('${collector}')">
      <div class="exp-hd-title">💸 Expenses ${total>0?'· ₱'+fmt(total):''}</div>
      <div style="display:flex;align-items:center;gap:8px">
        ${total>0?`<div class="exp-hd-amt">₱${fmt(total)}</div>`:''}
        <span style="font-size:11px;color:var(--blue);font-weight:700">+ Add</span>
      </div>
    </div>
    <div class="exp-body" id="expbody-${collector}">
      <div id="explist-${collector}">${renderExpList(collector)}</div>
      <div class="exp-add-row">
        <select class="exp-select" id="expcat-${collector}">${EXP_CATS.map(c=>`<option>${c}</option>`).join('')}</select>
        <input class="exp-inp" id="expdesc-${collector}" placeholder="Description">
        <input class="exp-inp" id="expamt-${collector}" type="number" inputmode="decimal" placeholder="₱ Amount" style="max-width:100px">
        <button class="btn-add-exp" onclick="addExpense('${collector}')">Add</button>
      </div>
    </div>
  </div>`;
}

function renderExpList(collector){
  const exps=expState[collector]||[];
  if(!exps.length) return '<div style="font-size:12px;color:var(--muted);padding:4px 0 8px">No expenses yet</div>';
  return exps.map((e,i)=>`
    <div class="exp-item">
      <div class="exp-cat">${e.cat}</div>
      <div class="exp-desc">${e.desc||'—'}</div>
      <div class="exp-amt">₱${fmt(e.amt)}</div>
      <button class="exp-del" onclick="removeExpense('${collector}',${i})">✕</button>
    </div>`).join('');
}

function toggleExpPanel(collector){
  document.getElementById('expbody-'+collector).classList.toggle('open');
}

async function addExpense(collector){
  const cat=document.getElementById('expcat-'+collector).value;
  const desc=document.getElementById('expdesc-'+collector).value.trim();
  const amt=parseFloat(document.getElementById('expamt-'+collector).value)||0;
  if(!amt){toast('Enter an amount');return;}
  try{
    const ctrl=new AbortController(), t=setTimeout(()=>ctrl.abort(),15000);
    const r=await fetch(`${SB}/rest/v1/harvest_expenses`,{
      method:'POST', headers:{...HDR,Prefer:'return=representation'},
      body:JSON.stringify({collector,expense_date:currentDate,category:cat,description:desc,amount:amt}),
      signal:ctrl.signal
    });
    clearTimeout(t);
    const rows=await r.json();
    const newId=Array.isArray(rows)&&rows[0]?rows[0].id:null;
    if(!expState[collector]) expState[collector]=[];
    expState[collector].push({id:newId,cat,desc,amt});
    document.getElementById('explist-'+collector).innerHTML=renderExpList(collector);
    document.getElementById('expdesc-'+collector).value='';
    document.getElementById('expamt-'+collector).value='';
    // Update header
    const total=(expState[collector]||[]).reduce((s,e)=>s+e.amt,0);
    const hd=document.querySelector(`#exp-card-${collector} .exp-hd-title`);
    if(hd) hd.textContent='💸 Expenses · ₱'+fmt(total);
    toast('✓ Expense saved');
  }catch(e){toast('Error: '+e.message);}
}

async function removeExpense(collector,idx){
  const e=expState[collector][idx];
  if(e&&e.id){
    try{ await sbDelete('collector_expenses?id=eq.'+e.id); }catch{}
  }
  expState[collector].splice(idx,1);
  document.getElementById('explist-'+collector).innerHTML=renderExpList(collector);
  toast('Removed');
}

// ── VENDO BLOCK ──────────────────────────────────────────
function renderVendo(h){
  const ps=packState[h.id]||{mix:0,peso:0,bugi:0,bills:0};
  const rec=Number(h.spawn_share||0);
  const cnt=calcCounted(ps);
  const isSaved=savedSet.has(h.id);
  const code=h.route_code||''; const name=(h.vendo_name||h.sheet_name||h.tg_name||'—');
  const suggest=suggestPacks(rec);

  return `
  <div class="vendo-block" id="vblock-${h.id}">
    <div class="vendo-hd">
      <div class="vhd-left">
        <div class="vname">${code?`<span style="background:var(--blue-light);color:var(--blue);font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;margin-right:4px">${code}</span>`:''} ${name}</div>
        <div class="varea">${h.area||'—'}</div>
      </div>
      <div class="vhd-right">
        <div class="v-coins-total">Coins total <span>₱${fmt(h.coins_total)}</span></div>
        <div class="v-spawn">Spawn Share<span>₱${fmt(rec)}</span></div>
      </div>
    </div>
    <div class="suggest-bar">🎯 Target ₱${fmt(rec)} — ${suggest}</div>
    <div class="vendo-body">
      <div class="pack-grid">
        <div class="pack-field">
          <div class="pack-label mix">₱1,000 Pack</div>
          <div class="pack-hint">Mix ₱5 · ₱10 · ₱20</div>
          <div class="pack-counter">
            <button class="pc-btn mix" onclick="adjPack(${h.id},'mix',-1)">−</button>
            <div class="pc-count" id="mix-cnt-${h.id}">${ps.mix||0}</div>
            <button class="pc-btn mix" onclick="adjPack(${h.id},'mix',1)">+</button>
            <div class="pc-total mix" id="mix-tot-${h.id}">₱${fmt((ps.mix||0)*1000)}</div>
          </div>
        </div>
        <div class="pack-field">
          <div class="pack-label peso">₱300 Pack</div>
          <div class="pack-hint">All ₱1 coins</div>
          <div class="pack-counter">
            <button class="pc-btn peso" onclick="adjPack(${h.id},'peso',-1)">−</button>
            <div class="pc-count" id="peso-cnt-${h.id}">${ps.peso||0}</div>
            <button class="pc-btn peso" onclick="adjPack(${h.id},'peso',1)">+</button>
            <div class="pc-total peso" id="peso-tot-${h.id}">₱${fmt((ps.peso||0)*300)}</div>
          </div>
        </div>
        <div class="pack-field">
          <div class="pack-label bugi">Bugi (Remainder)</div>
          <div class="pack-hint">Loose coins — exact amount</div>
          <input class="amt-inp" id="bugi-${h.id}" type="number" inputmode="decimal"
            value="${ps.bugi||''}" placeholder="₱0" min="0"
            oninput="onAmt(${h.id},'bugi')">
          <div class="amt-lbl bugi" id="bugi-lbl-${h.id}">${ps.bugi?'₱'+fmt(ps.bugi):''}</div>
        </div>
        <div class="pack-field">
          <div class="pack-label bills">Cash / Bills</div>
          <div class="pack-hint">Customer paid in bills</div>
          <input class="amt-inp" id="bills-${h.id}" type="number" inputmode="decimal"
            value="${ps.bills||''}" placeholder="₱0" min="0"
            oninput="onAmt(${h.id},'bills')">
          <div class="amt-lbl bills" id="bills-lbl-${h.id}">${ps.bills?'₱'+fmt(ps.bills):''}</div>
        </div>
      </div>
      <div class="def-strip" id="defstrip-${h.id}">
        ${defStripHtml(h.id,rec,cnt,isSaved)}
      </div>
    </div>
  </div>`;
}

function defStripHtml(hid,rec,cnt,isSaved){
  const gap=cnt>0?cnt-rec:null;
  let chips='';
  if(cnt>0){
    chips+=`<span class="dchip spawn">Spawn ₱${fmt(rec)}</span>`;
    chips+=`<span class="dchip counted">Counted ₱${fmt(cnt)}</span>`;
    if(gap===0)     chips+=`<span class="dchip match">✓ Match</span>`;
    else if(gap<0)  chips+=`<span class="dchip deficit">Deficit ₱${fmt(Math.abs(gap))}</span>`;
    else            chips+=`<span class="dchip surplus">Surplus ₱${fmt(gap)}</span>`;
  } else {
    chips+=`<span class="dchip pending">Not counted yet</span>`;
  }
  chips+=`<button class="btn-save ${isSaved?'saved':''}" id="btnsave-${hid}" onclick="savePacks(${hid})">${isSaved?'✓ Saved':'Save'}</button>`;
  return chips;
}

// ── PACK INTERACTIONS ────────────────────────────────────
function calcCounted(ps){
  return ((ps.mix||0)*1000)+((ps.peso||0)*300)+(ps.bugi||0)+(ps.bills||0);
}

function suggestPacks(spawnShare){
  const s=Math.round(spawnShare);
  const mix=Math.floor(s/1000);
  const rem=s-(mix*1000);
  const peso=Math.floor(rem/300);
  const bugi=rem-(peso*300);
  const parts=[];
  if(mix)  parts.push(mix+'×₱1,000');
  if(peso) parts.push(peso+'×₱300');
  if(bugi) parts.push('Bugi ₱'+bugi);
  return parts.length?parts.join(' + '):'₱0 check harvest';
}

function adjPack(hid,type,delta){
  if(!packState[hid]) packState[hid]={mix:0,peso:0,bugi:0,bills:0};
  packState[hid][type]=Math.max(0,(packState[hid][type]||0)+delta);
  const val=packState[hid][type];
  const mul=type==='mix'?1000:300;
  document.getElementById(type+'-cnt-'+hid).textContent=val;
  document.getElementById(type+'-tot-'+hid).textContent='₱'+fmt(val*mul);
  savedSet.delete(hid);
  refreshStrip(hid);
}

function onAmt(hid,type){
  if(!packState[hid]) packState[hid]={mix:0,peso:0,bugi:0,bills:0};
  const val=parseFloat(document.getElementById(type+'-'+hid).value)||0;
  packState[hid][type]=val;
  const lbl=document.getElementById(type+'-lbl-'+hid);
  if(lbl) lbl.textContent=val?'₱'+fmt(val):'';
  savedSet.delete(hid);
  refreshStrip(hid);
}

function refreshStrip(hid){
  const ps=packState[hid]||{};
  const h=allHarvests.find(x=>x.id===hid);
  if(!h) return;
  const rec=Number(h.spawn_share||0);
  const cnt=calcCounted(ps);
  const strip=document.getElementById('defstrip-'+hid);
  if(strip) strip.innerHTML=defStripHtml(hid,rec,cnt,savedSet.has(hid));
  // Update detail summary
  if(activeCollector){
    const harvests=allHarvests.filter(h=>h.collector===activeCollector);
    renderDetailSummary(harvests);
  }
}

// ── SAVE ─────────────────────────────────────────────────
async function savePacks(hid){
  const ps=packState[hid]||{mix:0,peso:0,bugi:0,bills:0};
  const h=allHarvests.find(x=>x.id===hid);
  if(!h) return;
  const btn=document.getElementById('btnsave-'+hid);
  if(btn){btn.disabled=true;btn.textContent='…';}

  // Check deficit/surplus and warn
  const _rec=Number(h.spawn_share||0);
  const _cnt=calcCounted(ps);
  if(_cnt>0 && _cnt!==_rec){
    const _gap=_cnt-_rec;
    const _msg=_gap<0
      ? `⚠️ SHORT by ₱${fmt(Math.abs(_gap))}\nCounted ₱${fmt(_cnt)} is less than Spawn Share ₱${fmt(_rec)}.\n\nSave anyway?`
      : `⚠️ SURPLUS of ₱${fmt(_gap)}\nCounted ₱${fmt(_cnt)} exceeds Spawn Share ₱${fmt(_rec)}.\n\nSave anyway?`;
    if(!confirm(_msg)){
      if(btn){btn.disabled=false;btn.textContent='Save';btn.classList.remove('saved');}
      return;
    }
  }

  try{
    await sbDelete('harvest_pack_items?harvest_id=eq.'+hid);
    const base={harvest_id:hid,vendo_id:h.vendo_id||null,collector:h.collector,harvest_date:currentDate};
    const rows=[];
    if((ps.mix||0)>0)   rows.push({...base,pack_type:'mix',  amount:ps.mix*1000});
    if((ps.peso||0)>0)  rows.push({...base,pack_type:'peso', amount:ps.peso*300});
    if((ps.bugi||0)>0)  rows.push({...base,pack_type:'bugi', amount:ps.bugi});
    if((ps.bills||0)>0) rows.push({...base,pack_type:'bills',amount:ps.bills});

    if(rows.length>0){
      const ctrl=new AbortController(), t=setTimeout(()=>ctrl.abort(),15000);
      const r=await fetch(`${SB}/rest/v1/harvest_pack_items`,{
        method:'POST',headers:{...HDR,Prefer:'return=minimal'},
        body:JSON.stringify(rows),signal:ctrl.signal
      });
      clearTimeout(t);
      if(!r.ok) throw new Error('HTTP '+r.status);
    }

    savedSet.add(hid);
    if(btn){btn.disabled=false;btn.textContent='✓ Saved';btn.classList.add('saved');}
    refreshStrip(hid);
    toast('✓ Saved — '+(h.vendo_name||h.tg_name||'Vendo'));
  }catch(e){
    toast('Error: '+e.message);
    if(btn){btn.disabled=false;btn.textContent='Retry';btn.classList.remove('saved');}
  }
}

// ── INIT ─────────────────────────────────────────────────
loadAccounts();
</script>
