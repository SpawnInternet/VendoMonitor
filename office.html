<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spawn Count</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="theme-color" content="#1e3cb8">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#1e3cb8;--blue-light:#eef2ff;--blue-mid:#c7d2fe;
  --green:#16a34a;--green-light:#f0fdf4;--green-mid:#86efac;
  --red:#dc2626;--red-light:#fef2f2;
  --amber:#d97706;--amber-light:#fffbeb;
  --purple:#7c3aed;--purple-light:#f5f3ff;
  --teal:#0d9488;--teal-light:#f0fdfa;
  --gray:#6b7280;--border:#e5e7eb;--bg:#f1f5f9;
  --text:#111827;--muted:#6b7280;
  --card:#fff;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);font-size:15px}

/* TOPBAR */
.topbar{background:var(--blue);color:#fff;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.tl{display:flex;flex-direction:column}
.tl-title{font-size:15px;font-weight:800;letter-spacing:.02em}
.tl-sub{font-size:10px;opacity:.65;margin-top:1px}
.tr{display:flex;align-items:center;gap:8px}
.user-chip{background:rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;display:none}
.btn-logout{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);color:#fff;border-radius:8px;padding:5px 13px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:none}

/* SCREENS */
.screen{display:none}
.screen.active{display:block}

/* ── PIN SCREEN ── */
.pin-wrap{max-width:340px;margin:32px auto;padding:0 16px}
.pin-hd{text-align:center;margin-bottom:24px}
.pin-hd h1{font-size:26px;font-weight:900;color:var(--blue)}
.pin-hd p{font-size:12px;color:var(--muted);margin-top:5px}
.pin-accs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:22px}
.acc-btn{padding:9px 18px;border-radius:22px;border:2px solid var(--border);background:var(--card);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--text);transition:.15s}
.acc-btn.sel{border-color:var(--blue);background:var(--blue-light);color:var(--blue)}
.pin-dots{display:flex;justify-content:center;gap:14px;margin:16px 0 14px}
.pin-dot{width:15px;height:15px;border-radius:50%;background:var(--border);transition:.2s}
.pin-dot.filled{background:var(--blue)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pk{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:16px;font-size:23px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;color:var(--text);transition:.1s}
.pk:active{background:var(--blue-light);transform:scale(.95)}
.pk.del{font-size:16px;color:var(--muted)}
.pin-err{text-align:center;color:var(--red);font-size:13px;font-weight:600;margin-top:12px;min-height:20px}

/* ── DATE BAR ── */
.date-bar{background:var(--card);border-bottom:2px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:53px;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.date-bar input[type=date]{border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px;font-family:inherit;outline:none;color:var(--text);background:var(--bg)}
.date-bar input[type=date]:focus{border-color:var(--blue)}
.btn-load{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.date-summary{margin-left:auto;display:flex;gap:16px}
.ds-item{text-align:right}
.ds-lbl{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.ds-val{font-size:14px;font-weight:800}

/* ── CONTENT AREA ── */
.content{padding:14px 12px;max-width:760px;margin:0 auto}

/* ── COLLECTOR BLOCK ── */
.col-block{background:var(--card);border-radius:14px;border:1px solid var(--border);margin-bottom:16px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.col-hd{background:linear-gradient(135deg,#1e3cb8,#2563eb);color:#fff;padding:11px 14px;display:flex;align-items:center;justify-content:space-between}
.col-name{font-size:14px;font-weight:800;letter-spacing:.01em}
.col-meta{font-size:10px;opacity:.8;margin-top:2px;display:flex;gap:10px}
.col-totals{text-align:right;font-size:12px}
.col-totals .lbl{font-size:9px;opacity:.75;text-transform:uppercase}
.col-totals .val{font-size:14px;font-weight:800}

/* expense row inside collector */
.exp-toggle-row{padding:8px 14px;background:#f8faff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.exp-toggle-btn{font-size:11px;font-weight:700;color:var(--blue);background:var(--blue-light);border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-family:inherit}
.exp-panel{display:none;padding:10px 14px;background:#f8faff;border-bottom:1px solid var(--border)}
.exp-panel.open{display:block}
.exp-list{margin-bottom:8px}
.exp-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.exp-item:last-child{border-bottom:none}
.exp-cat{font-size:11px;font-weight:700;color:var(--purple);min-width:70px}
.exp-desc{font-size:12px;color:var(--text);flex:1}
.exp-amt{font-size:13px;font-weight:700;color:var(--red)}
.exp-del{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:0 4px}
.exp-add-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.exp-select{border:1.5px solid var(--border);border-radius:7px;padding:6px 8px;font-size:12px;font-family:inherit;outline:none;background:#fff}
.exp-inp{border:1.5px solid var(--border);border-radius:7px;padding:6px 8px;font-size:12px;font-family:inherit;outline:none;flex:1;min-width:90px}
.exp-inp:focus,.exp-select:focus{border-color:var(--blue)}
.btn-add-exp{background:var(--purple);color:#fff;border:none;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}

/* ── VENDO ROW ── */
.vendo-row{border-bottom:1px solid var(--border);padding:12px 14px}
.vendo-row:last-child{border-bottom:none}
.vrow-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.vname{font-size:13px;font-weight:700;color:var(--text)}
.varea{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;margin-top:1px}
.vrecorded{font-size:12px;color:var(--muted);text-align:right}
.vrecorded strong{font-size:14px;font-weight:800;color:var(--text);display:block}

/* pack inputs */
.pack-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:8px}
.pack-field{background:var(--bg);border-radius:10px;padding:8px 10px}
.pack-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.pack-label.mix{color:var(--blue)}
.pack-label.peso{color:var(--purple)}
.pack-label.bugi{color:var(--teal)}
.pack-label.bills{color:var(--amber)}
.pack-hint{font-size:9px;color:var(--muted);margin-bottom:6px}
.pack-counter{display:flex;align-items:center;gap:6px}
.pc-btn{width:30px;height:30px;border-radius:50%;border:none;font-size:18px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.1s}
.pc-btn:active{transform:scale(.9)}
.pc-btn.mix{background:var(--blue);color:#fff}
.pc-btn.peso{background:var(--purple);color:#fff}
.pc-btn.bugi{background:var(--teal);color:#fff}
.pc-btn.bills{background:var(--amber);color:#fff}
.pc-count{font-size:20px;font-weight:800;min-width:30px;text-align:center;color:var(--text)}
.pc-total{font-size:11px;font-weight:700;border-radius:6px;padding:2px 7px;margin-left:auto;white-space:nowrap}
.pc-total.mix{background:var(--blue-light);color:var(--blue)}
.pc-total.peso{background:var(--purple-light);color:var(--purple)}
.pc-total.bugi{background:var(--teal-light);color:var(--teal)}
.pc-total.bills{background:var(--amber-light);color:var(--amber)}

/* amount inputs for bugi & bills (free-form peso amount) */
.amt-inp{border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-size:15px;font-weight:700;font-family:inherit;width:100%;outline:none;background:#fff}
.amt-inp:focus{border-color:var(--blue)}

/* deficit strip */
.deficit-strip{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:4px}
.dchip{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.dchip.recorded{background:var(--blue-light);color:var(--blue)}
.dchip.counted{background:var(--green-light);color:var(--green)}
.dchip.match{background:var(--green-light);color:var(--green)}
.dchip.deficit{background:var(--red-light);color:var(--red)}
.dchip.surplus{background:var(--amber-light);color:var(--amber)}
.dchip.pending{background:#f3f4f6;color:var(--gray)}
.btn-save{padding:6px 14px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--green);color:#fff;margin-left:auto;transition:.15s;white-space:nowrap}
.btn-save:active{transform:scale(.97)}
.btn-save.saved{background:var(--green-light);color:var(--green);border:1.5px solid var(--green-mid)}
.btn-save:disabled{opacity:.5;cursor:not-allowed}

/* loading / empty */
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:48px;color:var(--muted);font-size:13px}
.spinner{width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 16px;color:var(--muted);font-size:13px}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:#1e293b;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:.25s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:480px){
  .date-summary{display:none}
  .pack-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="tl">
    <div class="tl-title">🪙 Spawn Count</div>
    <div class="tl-sub">Pack Counter · Office</div>
  </div>
  <div class="tr">
    <div class="user-chip" id="user-chip"></div>
    <button class="btn-logout" id="btn-logout" onclick="doLogout()">Logout</button>
  </div>
</div>

<!-- PIN SCREEN -->
<div class="screen active" id="screen-pin">
  <div class="pin-wrap">
    <div class="pin-hd">
      <h1>🪙 Spawn Count</h1>
      <p>Select your name then enter your PIN</p>
    </div>
    <div class="pin-accs" id="pin-accs">
      <div class="loading"><div class="spinner"></div></div>
    </div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-pad">
      <button class="pk" onclick="pinKey('1')">1</button>
      <button class="pk" onclick="pinKey('2')">2</button>
      <button class="pk" onclick="pinKey('3')">3</button>
      <button class="pk" onclick="pinKey('4')">4</button>
      <button class="pk" onclick="pinKey('5')">5</button>
      <button class="pk" onclick="pinKey('6')">6</button>
      <button class="pk" onclick="pinKey('7')">7</button>
      <button class="pk" onclick="pinKey('8')">8</button>
      <button class="pk" onclick="pinKey('9')">9</button>
      <button class="pk del" onclick="pinKey('del')">⌫</button>
      <button class="pk" onclick="pinKey('0')">0</button>
      <button class="pk del" onclick="pinKey('clr')">✕</button>
    </div>
    <div class="pin-err" id="pin-err"></div>
  </div>
</div>

<!-- MAIN SCREEN -->
<div class="screen" id="screen-main">
  <div class="date-bar">
    <input type="date" id="date-picker">
    <button class="btn-load" onclick="loadData()">↻ Load</button>
    <div class="date-summary" id="date-summary"></div>
  </div>
  <div class="content" id="main-content">
    <div class="empty">Select a date and tap Load</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB  = 'https://cviraqfhphhsonjmrtvu.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2aXJhcWZocGhoc29uam1ydHZ1Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTY5NjYxOSwiZXhwIjoyMDkxMjcyNjE5fQ.qLPX_TW2U6W51nbOiotRdjUoofXnoWHi3oNfcIDmsek';
const HDR = {apikey:KEY, Authorization:'Bearer '+KEY, 'Content-Type':'application/json'};

const EXP_CATS = ['Fuel','Food','Parking','Repair','Load','Other'];

// State
let ACCOUNTS   = [];
let currentUser = null;
let pinBuffer  = '';
let selectedAcc = null;
let allHarvests = [];
let packState  = {}; // {harvest_id: {mix,peso,bugi,bills}}
let expState   = {}; // {collector: [{cat,desc,amt}]}
let savedSet   = new Set();

// ── ACCOUNTS / PIN ──────────────────────────────────────
async function loadAccounts() {
  try {
    const ctrl = new AbortController(), t = setTimeout(()=>ctrl.abort(),12000);
    const r = await fetch(`${SB}/rest/v1/office_accounts?active=eq.true&select=id,name,pin,role&order=name.asc`,{headers:HDR,signal:ctrl.signal});
    clearTimeout(t);
    const rows = await r.json();
    if (!Array.isArray(rows)) throw new Error();
    ACCOUNTS = rows.map(a=>({id:String(a.id),name:a.name,pin:a.pin||'0000',role:a.role||'Staff'}));
  } catch {
    ACCOUNTS = [{id:'1',name:'Gilbert',pin:'1189',role:'Staff'},{id:'2',name:'Ailyn',pin:'2274',role:'Staff'},{id:'3',name:'Joi',pin:'3361',role:'Staff'}];
  }
  document.getElementById('pin-accs').innerHTML = ACCOUNTS.map(a=>
    `<button class="acc-btn" data-id="${a.id}" onclick="selectAcc('${a.id}')">${a.name}</button>`
  ).join('');
}

function selectAcc(id) {
  selectedAcc = ACCOUNTS.find(a=>a.id===id);
  pinBuffer = '';
  updateDots();
  document.getElementById('pin-err').textContent='';
  document.querySelectorAll('.acc-btn').forEach(b=>b.classList.toggle('sel',b.dataset.id===id));
}

function pinKey(k) {
  if (!selectedAcc) { document.getElementById('pin-err').textContent='Select your name first'; return; }
  if (k==='del') pinBuffer = pinBuffer.slice(0,-1);
  else if (k==='clr') pinBuffer='';
  else if (pinBuffer.length<4) pinBuffer+=k;
  updateDots();
  document.getElementById('pin-err').textContent='';
  if (pinBuffer.length===4) setTimeout(checkPin,120);
}

function updateDots() {
  for(let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('filled',i<pinBuffer.length);
}

function checkPin() {
  if (pinBuffer===selectedAcc.pin) {
    currentUser = selectedAcc;
    document.getElementById('user-chip').textContent='👤 '+currentUser.name;
    document.getElementById('user-chip').style.display='block';
    document.getElementById('btn-logout').style.display='block';
    showScreen('main');
    const today = new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
    document.getElementById('date-picker').value = today;
    loadData();
  } else {
    document.getElementById('pin-err').textContent='Wrong PIN — try again';
    pinBuffer=''; updateDots();
  }
}

function doLogout() {
  currentUser=null; selectedAcc=null; pinBuffer='';
  allHarvests=[]; packState={}; expState={}; savedSet=new Set();
  document.getElementById('user-chip').style.display='none';
  document.getElementById('btn-logout').style.display='none';
  document.getElementById('pin-err').textContent='';
  document.getElementById('main-content').innerHTML='<div class="empty">Select a date and tap Load</div>';
  document.getElementById('date-summary').innerHTML='';
  document.querySelectorAll('.acc-btn').forEach(b=>b.classList.remove('sel'));
  updateDots();
  showScreen('pin');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

// ── LOAD DATA ────────────────────────────────────────────
async function loadData() {
  const date = document.getElementById('date-picker').value;
  if (!date) return;
  const el = document.getElementById('main-content');
  el.innerHTML = '<div class="loading"><div class="spinner"></div><span>Loading…</span></div>';
  packState={}; expState={}; savedSet=new Set();

  try {
    // Load harvests
    const r1 = await sbFetch(`harvests?harvest_date=eq.${date}&select=id,collector,vendo_name,tg_name,area,coins_total,net_collectible,spawn_share,harvested_at&order=collector.asc,harvested_at.asc`);
    if (!Array.isArray(r1)) { el.innerHTML='<div class="empty">Error loading harvests</div>'; return; }
    allHarvests = r1;
    if (!allHarvests.length) { el.innerHTML='<div class="empty">No harvests found for this date</div>'; document.getElementById('date-summary').innerHTML=''; return; }

    // Load existing pack items
    const r2 = await sbFetch(`harvest_pack_items?harvest_date=eq.${date}&select=harvest_id,pack_type,amount`);
    if (Array.isArray(r2)) {
      r2.forEach(p => {
        if (!packState[p.harvest_id]) packState[p.harvest_id]={mix:0,peso:0,bugi:0,bills:0};
        if (p.pack_type==='mix')   packState[p.harvest_id].mix   = (packState[p.harvest_id].mix||0) + Number(p.amount)/1000;
        if (p.pack_type==='peso')  packState[p.harvest_id].peso  = (packState[p.harvest_id].peso||0) + Number(p.amount)/300;
        if (p.pack_type==='bugi')  packState[p.harvest_id].bugi  = (packState[p.harvest_id].bugi||0) + Number(p.amount);
        if (p.pack_type==='bills') packState[p.harvest_id].bills = (packState[p.harvest_id].bills||0) + Number(p.amount);
        savedSet.add(p.harvest_id);
      });
    }

    // Load existing expenses
    const r3 = await sbFetch(`harvest_expenses?harvest_date=eq.${date}&select=collector,category,description,amount&order=created_at.asc`);
    if (Array.isArray(r3)) {
      r3.forEach(e => {
        if (!expState[e.collector]) expState[e.collector]=[];
        expState[e.collector].push({cat:e.category,desc:e.description||'',amt:Number(e.amount)});
      });
    }

    render();
  } catch(e) {
    el.innerHTML = '<div class="empty">Error: '+e.message+'</div>';
  }
}

async function sbFetch(path) {
  const ctrl = new AbortController(), t = setTimeout(()=>ctrl.abort(),30000);
  const r = await fetch(`${SB}/rest/v1/${path}`,{headers:HDR,signal:ctrl.signal});
  clearTimeout(t);
  return r.json();
}

// ── RENDER ───────────────────────────────────────────────
function render() {
  const byCol = {};
  allHarvests.forEach(h=>{
    if (!byCol[h.collector]) byCol[h.collector]=[];
    byCol[h.collector].push(h);
  });

  let gRec=0, gCnt=0;
  allHarvests.forEach(h=>{
    gRec += Number(h.spawn_share||0);
    const ps = packState[h.id];
    if (ps) gCnt += counted(ps);
  });
  const gGap = gCnt > 0 ? gCnt - gRec : null;

  document.getElementById('date-summary').innerHTML = `
    <div class="ds-item"><div class="ds-lbl">Vendos</div><div class="ds-val">${allHarvests.length}</div></div>
    <div class="ds-item"><div class="ds-lbl">Spawn Share</div><div class="ds-val">₱${fmt(gRec)}</div></div>
    ${gCnt>0?`
    <div class="ds-item"><div class="ds-lbl">Counted</div><div class="ds-val" style="color:var(--green)">₱${fmt(gCnt)}</div></div>
    <div class="ds-item"><div class="ds-lbl">Gap</div><div class="ds-val" style="color:${gGap<0?'var(--red)':gGap>0?'var(--amber)':'var(--green)'}">
      ${gGap>=0?'+':''}₱${fmt(gGap)}</div></div>`:''}
  `;

  document.getElementById('main-content').innerHTML = Object.entries(byCol).map(([col,harvests])=>renderCollector(col,harvests)).join('');
}

function renderCollector(collector, harvests) {
  const cRec  = harvests.reduce((s,h)=>s+Number(h.spawn_share||0),0);
  const cCnt  = harvests.reduce((s,h)=>{ const ps=packState[h.id]; return s+(ps?counted(ps):0); },0);
  const cDone = harvests.filter(h=>savedSet.has(h.id)).length;
  const exps  = expState[collector]||[];
  const expTotal = exps.reduce((s,e)=>s+e.amt,0);

  return `
  <div class="col-block" id="col-${collector}">
    <div class="col-hd">
      <div>
        <div class="col-name">👤 ${collector}</div>
        <div class="col-meta">
          <span>${harvests.length} vendos</span>
          <span>${cDone}/${harvests.length} saved</span>
          ${expTotal>0?`<span>Expenses ₱${fmt(expTotal)}</span>`:''}
        </div>
      </div>
      <div class="col-totals">
        <div class="lbl">Spawn Share</div><div class="val">₱${fmt(cRec)}</div>
        ${cCnt>0?`<div class="lbl" style="margin-top:4px">Counted</div><div class="val" style="color:#86efac">₱${fmt(cCnt)}</div>`:''}
      </div>
    </div>
    <!-- Expense section -->
    <div class="exp-toggle-row">
      <span style="font-size:11px;color:var(--muted)">💸 Expenses ${expTotal>0?'· ₱'+fmt(expTotal):''}</span>
      <button class="exp-toggle-btn" onclick="toggleExp('${collector}')">+ Add Expense</button>
    </div>
    <div class="exp-panel" id="exppanel-${collector}">
      <div class="exp-list" id="explist-${collector}">
        ${renderExpList(collector)}
      </div>
      <div class="exp-add-row">
        <select class="exp-select" id="expcat-${collector}">
          ${EXP_CATS.map(c=>`<option>${c}</option>`).join('')}
        </select>
        <input class="exp-inp" id="expdesc-${collector}" placeholder="Description (optional)">
        <input class="exp-inp" id="expamt-${collector}" type="number" placeholder="₱ Amount" inputmode="decimal" style="max-width:100px">
        <button class="btn-add-exp" onclick="addExpense('${collector}')">+ Add</button>
      </div>
    </div>
    <!-- Vendo rows -->
    ${harvests.map(h=>renderVendo(h)).join('')}
  </div>`;
}

function renderExpList(collector) {
  const exps = expState[collector]||[];
  if (!exps.length) return '<div style="font-size:12px;color:var(--muted);padding:4px 0">No expenses yet</div>';
  return exps.map((e,i)=>`
    <div class="exp-item">
      <div class="exp-cat">${e.cat}</div>
      <div class="exp-desc">${e.desc||'—'}</div>
      <div class="exp-amt">₱${fmt(e.amt)}</div>
      <button class="exp-del" onclick="removeExpense('${collector}',${i})">✕</button>
    </div>`).join('');
}

function renderVendo(h) {
  const ps  = packState[h.id]||{mix:0,peso:0,bugi:0,bills:0};
  const rec = Number(h.spawn_share||0);
  const cnt = counted(ps);
  const gap = cnt > 0 ? cnt - rec : null;
  const isSaved = savedSet.has(h.id);
  const name = h.vendo_name||h.tg_name||'—';

  let defChip = `<span class="dchip pending">Not counted yet</span>`;
  let recCounted = '';
  if (cnt > 0) {
    recCounted = `<span class="dchip recorded">Recorded ₱${fmt(rec)}</span><span class="dchip counted">Counted ₱${fmt(cnt)}</span>`;
    if (gap===0)     defChip=`<span class="dchip match">✓ Match</span>`;
    else if (gap<0)  defChip=`<span class="dchip deficit">Deficit ₱${fmt(Math.abs(gap))}</span>`;
    else             defChip=`<span class="dchip surplus">Surplus ₱${fmt(gap)}</span>`;
  }

  return `
  <div class="vendo-row" id="vrow-${h.id}">
    <div class="vrow-top">
      <div>
        <div class="vname">${name}</div>
        <div class="varea">${h.area||'—'}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase">Coins Total</div>
        <div style="font-size:12px;font-weight:700;color:var(--text)">₱${fmt(h.coins_total)}</div>
        <div style="font-size:9px;color:var(--green);font-weight:700;text-transform:uppercase;margin-top:3px">Spawn Share 75%</div>
        <div style="font-size:18px;font-weight:900;color:var(--green)">₱${fmt(rec)}</div>
      </div>
    </div>
    <div style="background:var(--green-light);border:1px solid var(--green-mid);border-radius:8px;padding:6px 10px;margin-bottom:10px;font-size:11px;color:var(--green);font-weight:600">
      🎯 Pack to reach <strong>₱${fmt(rec)}</strong> — ${suggestPacks(rec)}
    </div>

    <div class="pack-grid">
      <!-- ₱1,000 mix pack -->
      <div class="pack-field">
        <div class="pack-label mix">₱1,000 Pack</div>
        <div class="pack-hint">Mix ₱5 · ₱10 · ₱20</div>
        <div class="pack-counter">
          <button class="pc-btn mix" onclick="adjPack(${h.id},'mix',-1)">−</button>
          <div class="pc-count" id="mix-cnt-${h.id}">${ps.mix||0}</div>
          <button class="pc-btn mix" onclick="adjPack(${h.id},'mix',1)">+</button>
          <div class="pc-total mix" id="mix-tot-${h.id}">₱${fmt((ps.mix||0)*1000)}</div>
        </div>
      </div>
      <!-- ₱300 peso pack -->
      <div class="pack-field">
        <div class="pack-label peso">₱300 Pack</div>
        <div class="pack-hint">All ₱1 coins</div>
        <div class="pack-counter">
          <button class="pc-btn peso" onclick="adjPack(${h.id},'peso',-1)">−</button>
          <div class="pc-count" id="peso-cnt-${h.id}">${ps.peso||0}</div>
          <button class="pc-btn peso" onclick="adjPack(${h.id},'peso',1)">+</button>
          <div class="pc-total peso" id="peso-tot-${h.id}">₱${fmt((ps.peso||0)*300)}</div>
        </div>
      </div>
      <!-- Bugi (remainder) -->
      <div class="pack-field">
        <div class="pack-label bugi">Bugi (Remainder)</div>
        <div class="pack-hint">Loose coins — enter exact amount</div>
        <input class="amt-inp" id="bugi-${h.id}" type="number" inputmode="decimal"
          value="${ps.bugi||''}" placeholder="₱0.00" min="0"
          oninput="onAmtInput(${h.id},'bugi')">
      </div>
      <!-- Cash / Bills -->
      <div class="pack-field">
        <div class="pack-label bills">Cash / Bills</div>
        <div class="pack-hint">Customer paid in bills</div>
        <input class="amt-inp" id="bills-${h.id}" type="number" inputmode="decimal"
          value="${ps.bills||''}" placeholder="₱0.00" min="0"
          oninput="onAmtInput(${h.id},'bills')">
      </div>
    </div>

    <div class="deficit-strip" id="defstrip-${h.id}">
      ${recCounted}${defChip}
      <button class="btn-save ${isSaved?'saved':''}" id="btnsave-${h.id}" onclick="savePacks(${h.id})">
        ${isSaved?'✓ Saved':'Save'}
      </button>
    </div>
  </div>`;
}

// ── PACK LOGIC ───────────────────────────────────────────
function suggestPacks(spawnShare) {
  const s = Math.round(spawnShare);
  const mix  = Math.floor(s / 1000);
  const rem1 = s - (mix * 1000);
  const peso = Math.floor(rem1 / 300);
  const bugi = rem1 - (peso * 300);
  const parts = [];
  if (mix)  parts.push(mix  + '×₱1,000');
  if (peso) parts.push(peso + '×₱300');
  if (bugi) parts.push('Bugi ₱' + bugi);
  return parts.length ? '(' + parts.join(' + ') + ')' : '(₱0 — check harvest)';
}

function counted(ps) {
  return ((ps.mix||0)*1000) + ((ps.peso||0)*300) + (ps.bugi||0) + (ps.bills||0);
}

function adjPack(hid, type, delta) {
  if (!packState[hid]) packState[hid]={mix:0,peso:0,bugi:0,bills:0};
  packState[hid][type] = Math.max(0,(packState[hid][type]||0)+delta);
  const val = packState[hid][type];
  const mul = type==='mix'?1000:300;
  document.getElementById(type+'-cnt-'+hid).textContent = val;
  document.getElementById(type+'-tot-'+hid).textContent = '₱'+fmt(val*mul);
  savedSet.delete(hid);
  refreshBtn(hid);
  refreshStrip(hid);
}

function onAmtInput(hid, type) {
  if (!packState[hid]) packState[hid]={mix:0,peso:0,bugi:0,bills:0};
  const val = parseFloat(document.getElementById(type+'-'+hid).value)||0;
  packState[hid][type] = val;
  savedSet.delete(hid);
  refreshBtn(hid);
  refreshStrip(hid);
}

function refreshStrip(hid) {
  const ps  = packState[hid]||{};
  const h   = allHarvests.find(x=>x.id===hid);
  if (!h) return;
  const rec = Number(h.spawn_share||0);
  const cnt = counted(ps);
  const gap = cnt > 0 ? cnt - rec : null;

  let defChip = `<span class="dchip pending">Not counted yet</span>`;
  let recCounted = '';
  if (cnt > 0) {
    recCounted = `<span class="dchip recorded">Recorded ₱${fmt(rec)}</span><span class="dchip counted">Counted ₱${fmt(cnt)}</span>`;
    if (gap===0)    defChip=`<span class="dchip match">✓ Match</span>`;
    else if (gap<0) defChip=`<span class="dchip deficit">Deficit ₱${fmt(Math.abs(gap))}</span>`;
    else            defChip=`<span class="dchip surplus">Surplus ₱${fmt(gap)}</span>`;
  }
  const btn = document.getElementById('btnsave-'+hid);
  const btnHtml = btn ? btn.outerHTML : '';
  const strip = document.getElementById('defstrip-'+hid);
  if (strip) strip.innerHTML = recCounted + defChip + btnHtml;
  const newBtn = document.getElementById('btnsave-'+hid);
  if (newBtn) newBtn.onclick = ()=>savePacks(hid);
}

function refreshBtn(hid) {
  const btn = document.getElementById('btnsave-'+hid);
  if (!btn) return;
  if (savedSet.has(hid)) { btn.textContent='✓ Saved'; btn.classList.add('saved'); }
  else { btn.textContent='Save'; btn.classList.remove('saved'); }
}

// ── SAVE PACKS ───────────────────────────────────────────
async function savePacks(hid) {
  const ps = packState[hid]||{mix:0,peso:0,bugi:0,bills:0};
  const h  = allHarvests.find(x=>x.id===hid);
  if (!h) return;
  const date = document.getElementById('date-picker').value;
  const btn  = document.getElementById('btnsave-'+hid);
  if (btn) { btn.disabled=true; btn.textContent='…'; }

  try {
    // Delete existing
    await sbDelete(`harvest_pack_items?harvest_id=eq.${hid}`);

    // Build inserts
    const rows = [];
    const base = {harvest_id:hid, vendo_id:h.vendo_id||null, collector:h.collector, harvest_date:date};
    if ((ps.mix||0) > 0)   rows.push({...base, pack_type:'mix',   amount:(ps.mix)*1000});
    if ((ps.peso||0) > 0)  rows.push({...base, pack_type:'peso',  amount:(ps.peso)*300});
    if ((ps.bugi||0) > 0)  rows.push({...base, pack_type:'bugi',  amount:ps.bugi});
    if ((ps.bills||0) > 0) rows.push({...base, pack_type:'bills', amount:ps.bills});

    if (rows.length > 0) {
      const ctrl = new AbortController(), t = setTimeout(()=>ctrl.abort(),15000);
      const r = await fetch(`${SB}/rest/v1/harvest_pack_items`,{
        method:'POST', headers:{...HDR,Prefer:'return=minimal'}, body:JSON.stringify(rows), signal:ctrl.signal
      });
      clearTimeout(t);
      if (!r.ok) throw new Error('HTTP '+r.status);
    }

    savedSet.add(hid);
    if (btn) { btn.disabled=false; btn.textContent='✓ Saved'; btn.classList.add('saved'); }
    toast('✓ Saved — '+(h.vendo_name||h.tg_name||'Vendo'));
    refreshStrip(hid);

  } catch(e) {
    toast('Error: '+e.message);
    if (btn) { btn.disabled=false; btn.textContent='Retry'; btn.classList.remove('saved'); }
  }
}

async function sbDelete(path) {
  const ctrl = new AbortController(), t = setTimeout(()=>ctrl.abort(),15000);
  await fetch(`${SB}/rest/v1/${path}`,{method:'DELETE',headers:{...HDR,Prefer:'return=minimal'},signal:ctrl.signal});
  clearTimeout(t);
}

// ── EXPENSES ─────────────────────────────────────────────
function toggleExp(collector) {
  const panel = document.getElementById('exppanel-'+collector);
  panel.classList.toggle('open');
}

async function addExpense(collector) {
  const cat  = document.getElementById('expcat-'+collector).value;
  const desc = document.getElementById('expdesc-'+collector).value.trim();
  const amt  = parseFloat(document.getElementById('expamt-'+collector).value)||0;
  if (!amt) { toast('Enter an amount'); return; }

  const date = document.getElementById('date-picker').value;
  try {
    const ctrl = new AbortController(), t = setTimeout(()=>ctrl.abort(),15000);
    const r = await fetch(`${SB}/rest/v1/harvest_expenses`,{
      method:'POST',
      headers:{...HDR,Prefer:'return=minimal'},
      body:JSON.stringify({collector,harvest_date:date,category:cat,description:desc,amount:amt}),
      signal:ctrl.signal
    });
    clearTimeout(t);
    if (!r.ok) throw new Error('HTTP '+r.status);

    if (!expState[collector]) expState[collector]=[];
    expState[collector].push({cat,desc,amt});
    document.getElementById('explist-'+collector).innerHTML = renderExpList(collector);
    document.getElementById('expdesc-'+collector).value='';
    document.getElementById('expamt-'+collector).value='';
    toast('✓ Expense added');

    // Refresh collector meta
    const expTotal = (expState[collector]||[]).reduce((s,e)=>s+e.amt,0);
    const metaEl = document.querySelector(`#col-${collector} .col-meta`);
    if (metaEl) {
      const spans = metaEl.querySelectorAll('span');
      const expSpan = [...spans].find(s=>s.textContent.includes('Expense'));
      if (expSpan) expSpan.textContent='Expenses ₱'+fmt(expTotal);
      else metaEl.innerHTML += `<span>Expenses ₱${fmt(expTotal)}</span>`;
    }
    const toggleRow = document.querySelector(`#col-${collector} .exp-toggle-row span`);
    if (toggleRow) toggleRow.textContent='💸 Expenses · ₱'+fmt(expTotal);

  } catch(e) { toast('Error: '+e.message); }
}

function removeExpense(collector, idx) {
  expState[collector].splice(idx,1);
  document.getElementById('explist-'+collector).innerHTML = renderExpList(collector);
  // Note: this only removes from local state — would need a delete call if persisted with IDs
  toast('Removed from list (save page to re-sync)');
}

// ── UTILS ─────────────────────────────────────────────────
function fmt(n) { return Math.round(Number(n||0)).toLocaleString('en-PH'); }

function toast(msg, dur=2500) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),dur);
}

// ── INIT ──────────────────────────────────────────────────
loadAccounts();
</script>
