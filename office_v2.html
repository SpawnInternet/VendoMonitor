<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spawn Count</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<!-- v2026-06-15-spawncount -->
<meta name="theme-color" content="#1e3cb8">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#1e3cb8;--blue-light:#eef2ff;--blue-mid:#c7d2fe;
  --green:#16a34a;--green-light:#f0fdf4;--green-mid:#86efac;
  --red:#dc2626;--red-light:#fef2f2;
  --amber:#d97706;--amber-light:#fffbeb;
  --purple:#7c3aed;--purple-light:#f5f3ff;
  --teal:#0d9488;--teal-light:#f0fdfa;
  --gray:#6b7280;--border:#e5e7eb;--bg:#f1f5f9;
  --text:#111827;--muted:#6b7280;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);font-size:15px}

/* TOPBAR */
.topbar{background:var(--blue);color:#fff;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.tl-title{font-size:15px;font-weight:800}
.tl-sub{font-size:10px;opacity:.65;margin-top:1px}
.tr{display:flex;align-items:center;gap:8px}
.user-chip{background:rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;display:none}
.btn-sm{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);color:#fff;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}

/* SCREENS */
.screen{display:none}
.screen.active{display:block}

/* ── PIN SCREEN ── */
.pin-wrap{max-width:340px;margin:32px auto;padding:0 16px}
.pin-hd{text-align:center;margin-bottom:24px}
.pin-hd h1{font-size:26px;font-weight:900;color:var(--blue)}
.pin-hd p{font-size:12px;color:var(--muted);margin-top:5px}
.pin-accs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:22px}
.acc-btn{padding:10px 20px;border-radius:22px;border:2px solid var(--border);background:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--text);transition:.15s}
.acc-btn.sel{border-color:var(--blue);background:var(--blue-light);color:var(--blue)}
.pin-dots{display:flex;justify-content:center;gap:14px;margin:16px 0 14px}
.pin-dot{width:15px;height:15px;border-radius:50%;background:var(--border);transition:.2s}
.pin-dot.filled{background:var(--blue)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pk{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:16px;font-size:23px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;color:var(--text);transition:.1s}
.pk:active{background:var(--blue-light);transform:scale(.95)}
.pk.del{font-size:16px;color:var(--muted)}
.pin-err{text-align:center;color:var(--red);font-size:13px;font-weight:600;margin-top:12px;min-height:20px}

/* ── COLLECTOR SELECT SCREEN ── */
.home-wrap{max-width:520px;margin:0 auto;padding:20px 14px}
.home-date-row{display:flex;align-items:center;gap:10px;margin-bottom:20px;background:#fff;border-radius:12px;border:1px solid var(--border);padding:12px 14px}
.home-date-lbl{font-size:12px;color:var(--muted);font-weight:600;flex:1}
.home-date-lbl strong{display:block;font-size:16px;font-weight:800;color:var(--text)}
.btn-change-date{font-size:11px;font-weight:700;color:var(--blue);background:var(--blue-light);border:none;border-radius:6px;padding:5px 10px;cursor:pointer;font-family:inherit}
.date-inp-wrap{display:none;margin-top:8px}
.date-inp-wrap input{border:1.5px solid var(--blue);border-radius:8px;padding:7px 10px;font-size:13px;font-family:inherit;outline:none;width:100%}

.section-lbl{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;padding:0 2px}

/* collector cards */
.col-card{background:#fff;border-radius:14px;border:1px solid var(--border);margin-bottom:10px;cursor:pointer;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden}
.col-card:active{transform:scale(.985);box-shadow:none}
.col-card-inner{display:flex;align-items:center;gap:14px;padding:14px}
.col-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#1e3cb8,#2563eb);color:#fff;font-size:16px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.col-info{flex:1}
.col-cname{font-size:15px;font-weight:800;color:var(--text)}
.col-meta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:10px;flex-wrap:wrap}
.col-stats{text-align:right}
.col-spawn{font-size:17px;font-weight:900;color:var(--green)}
.col-spawn-lbl{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase}
.col-progress{height:4px;background:var(--border);border-radius:2px;margin:0}
.col-progress-fill{height:4px;background:var(--green);border-radius:2px;transition:.3s}
.col-card.done .col-avatar{background:linear-gradient(135deg,#16a34a,#22c55e)}

/* no harvests */
.no-harvest{text-align:center;padding:48px 16px;color:var(--muted);font-size:13px}
.no-harvest .icon{font-size:40px;margin-bottom:12px}

/* ── VENDO DETAIL SCREEN ── */
.detail-topbar{background:#fff;border-bottom:2px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:53px;z-index:100}
.btn-back{background:var(--blue-light);border:none;color:var(--blue);border-radius:8px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.detail-col-name{font-size:14px;font-weight:800;color:var(--text);flex:1}
.detail-summary{background:#f8fafc;border-bottom:1.5px solid var(--border);padding:8px 14px;display:flex;gap:0;overflow-x:hidden;position:sticky;top:42px;z-index:100;flex-wrap:nowrap}
.detail-summary .ds-chip{text-align:center;padding:4px 14px;border-right:1px solid var(--border);flex-shrink:0}
.detail-summary .ds-chip:last-child{border-right:none}
.detail-summary .ds-val{font-size:14px;font-weight:800;display:block}
.detail-summary .ds-lbl{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;display:block}

.detail-content{max-width:760px;margin:0 auto;padding:14px 12px}

/* expense section */
.exp-card{background:#fff;border-radius:12px;border:1px solid var(--border);margin-bottom:14px;overflow:hidden}
.exp-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;user-select:none}
.exp-hd-title{font-size:12px;font-weight:700;color:var(--purple);display:flex;align-items:center;gap:6px}
.exp-hd-amt{font-size:13px;font-weight:800;color:var(--purple)}
.exp-body{display:none;padding:10px 14px;border-top:1px solid var(--border)}
.exp-body.open{display:block}
.exp-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.exp-item:last-child{border-bottom:none}
.exp-cat{font-size:11px;font-weight:700;color:var(--purple);min-width:65px}
.exp-desc{font-size:12px;color:var(--text);flex:1}
.exp-amt{font-size:13px;font-weight:700;color:var(--red)}
.exp-del{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:0 4px}
.exp-add-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.exp-select,.exp-inp{border:1.5px solid var(--border);border-radius:7px;padding:7px 9px;font-size:12px;font-family:inherit;outline:none;background:#fff}
.exp-select:focus,.exp-inp:focus{border-color:var(--purple)}
.exp-inp{flex:1;min-width:80px}
.btn-add-exp{background:var(--purple);color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}

/* vendo block */
.vendo-block{background:#fff;border-radius:14px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.vendo-hd{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.vhd-left .vname{font-size:14px;font-weight:800;color:var(--text)}
.vhd-left .varea{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;margin-top:2px}
.vhd-right{text-align:right}
.v-coins-total{font-size:11px;color:var(--muted)}
.v-coins-total span{font-weight:700;color:var(--text)}
.v-spawn{font-size:11px;color:var(--green);font-weight:700;text-transform:uppercase;margin-top:2px}
.v-spawn span{font-size:18px;font-weight:900;color:var(--green);display:block}

.suggest-bar{background:var(--green-light);border-bottom:1px solid var(--green-mid);padding:7px 14px;font-size:11px;color:var(--green);font-weight:600}

.vendo-body{padding:12px 14px}

/* pack grid */
.pack-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.pack-field{background:var(--bg);border-radius:10px;padding:9px 10px}
.pack-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.pack-label.mix{color:var(--blue)}
.pack-label.peso{color:var(--purple)}
.pack-label.bugi{color:var(--teal)}
.pack-label.bills{color:var(--amber)}
.pack-hint{font-size:9px;color:var(--muted);margin-bottom:6px}
.pack-counter{display:flex;align-items:center;gap:6px}
.pc-btn{width:32px;height:32px;border-radius:50%;border:none;font-size:20px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.1s}
.pc-btn:active{transform:scale(.88)}
.pc-btn.mix{background:var(--blue);color:#fff}
.pc-btn.peso{background:var(--purple);color:#fff}
.pc-count{font-size:20px;font-weight:800;min-width:32px;text-align:center}
.pc-total{font-size:11px;font-weight:700;border-radius:6px;padding:2px 7px;margin-left:auto;white-space:nowrap}
.pc-total.mix{background:var(--blue-light);color:var(--blue)}
.pc-total.peso{background:var(--purple-light);color:var(--purple)}
.amt-inp{border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-size:15px;font-weight:700;font-family:inherit;width:100%;outline:none;background:#fff}
.amt-inp:focus{border-color:var(--blue)}
.amt-lbl{font-size:11px;font-weight:700;margin-top:4px}
.amt-lbl.bugi{color:var(--teal)}
.amt-lbl.bills{color:var(--amber)}

/* deficit strip */
.def-strip{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dchip{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.dchip.spawn{background:var(--green-light);color:var(--green);border:1px solid var(--green-mid)}
.dchip.counted{background:var(--blue-light);color:var(--blue)}
.dchip.match{background:var(--green-light);color:var(--green)}
.dchip.deficit{background:var(--red-light);color:var(--red)}
.dchip.surplus{background:var(--amber-light);color:var(--amber)}
.dchip.pending{background:#f3f4f6;color:var(--gray)}
.btn-save{padding:7px 16px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--green);color:#fff;margin-left:auto;transition:.15s;white-space:nowrap;flex-shrink:0}
.btn-save:active{transform:scale(.96)}
.btn-save.saved{background:var(--green-light);color:var(--green);border:1.5px solid var(--green-mid)}
.btn-save:disabled{opacity:.5}

/* loading/empty */
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:48px;color:var(--muted);font-size:13px}
.spinner{width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 16px;color:var(--muted);font-size:13px}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:#1e293b;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:.25s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:480px){.pack-grid{grid-template-columns:1fr 1fr}}

/* Custom confirm modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.modal-box{background:#fff;border-radius:20px;padding:28px 24px 20px;max-width:320px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:modalPop .2s ease}
@keyframes modalPop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.modal-icon{font-size:40px;text-align:center;margin-bottom:12px}
.modal-title{font-size:17px;font-weight:900;text-align:center;margin-bottom:6px}
.modal-msg{font-size:13px;color:var(--muted);text-align:center;line-height:1.5;margin-bottom:20px}
.modal-btns{display:flex;gap:10px}
.modal-btn{flex:1;padding:12px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.modal-btn:active{transform:scale(.97)}
.modal-btn.cancel{background:var(--bg);color:var(--muted);border:1.5px solid var(--border)}
.modal-btn.confirm{color:#fff}
.modal-btn.confirm.surplus{background:var(--amber)}
.modal-btn.confirm.deficit{background:var(--red)}

/* ── RECONCILIATION SCREEN ── */
.recon-header{background:linear-gradient(135deg,#1e3cb8,#2563eb);color:#fff;padding:16px;position:sticky;top:53px;z-index:100}
.recon-col-name{font-size:16px;font-weight:900}
.recon-date{font-size:11px;opacity:.75;margin-top:2px}
.recon-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.recon-stat{background:rgba(255,255,255,.15);border-radius:8px;padding:8px;text-align:center}
.recon-stat-val{font-size:16px;font-weight:900}
.recon-stat-lbl{font-size:9px;opacity:.75;text-transform:uppercase;margin-top:1px}

.recon-section-title{font-size:10px;font-weight:800;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin:14px 0 8px;padding:0 2px}

.recon-vendo{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:12px 14px;margin-bottom:8px}
.recon-vendo.match{border-color:#86efac;background:#f0fdf4}
.recon-vendo.short{border-color:#fca5a5;background:#fef2f2}
.recon-vendo.surplus{border-color:#fcd34d;background:#fffbeb}
.recon-vendo.uncounted{border-color:#e5e7eb;background:#f9fafb}

.rv-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.rv-code{background:#1e3cb8;color:#fff;font-size:10px;font-weight:900;padding:2px 7px;border-radius:4px;letter-spacing:.06em;margin-right:5px}
.rv-name{font-size:13px;font-weight:800;color:#1e293b}
.rv-time{font-size:10px;color:#9ca3af}
.rv-coins{font-size:11px;color:#6b7280}
.rv-packs{font-size:11px;color:#374151;margin:4px 0}
.rv-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:6px;padding-top:6px;border-top:1px dashed #e5e7eb}
.rv-spawn{font-size:14px;font-weight:900;color:#15803d}
.rv-status{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.rv-status.match{background:#dcfce7;color:#15803d}
.rv-status.short{background:#fee2e2;color:#dc2626}
.rv-status.surplus{background:#fef9c3;color:#92400e}
.rv-status.uncounted{background:#f3f4f6;color:#6b7280}

.recon-exp-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f3f4f6;font-size:13px}

.recon-total-box{background:#f0fdf4;border:2px solid #86efac;border-radius:14px;padding:14px 16px;margin:14px 0}
.recon-total-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.recon-net{font-size:28px;font-weight:900;color:#1e3cb8;text-align:center;margin-top:4px}

.btn-reconcile{width:100%;padding:16px;background:linear-gradient(135deg,#15803d,#16a34a);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:900;cursor:pointer;font-family:inherit;margin-top:4px;box-shadow:0 4px 12px rgba(21,128,61,.3)}
.btn-reconcile:active{transform:scale(.98)}
.btn-reconcile.done{background:linear-gradient(135deg,#6b7280,#9ca3af);box-shadow:none}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div>
    <div class="tl-title">🪙 Spawn Count</div>
    <div class="tl-sub" id="topbar-sub">Pack Counter · Office</div>
  </div>
  <div class="tr">
    <div class="user-chip" id="user-chip"></div>
    <button class="btn-sm" id="btn-logout" style="display:none" onclick="doLogout()">Logout</button>
  </div>
</div>

<!-- SCREEN: PIN -->
<div class="screen active" id="screen-pin">

    <div class="pin-dots">

<!-- SCREEN: COLLECTOR SELECT -->
<div class="screen" id="screen-home">

    <div class="section-lbl">Select Collector</div>
    <div id="collector-cards">
      <div class="loading"><div class="spinner"></div><span>Loading…</span></div>

</div>

<!-- SCREEN: VENDO DETAIL -->
<div class="screen" id="screen-detail">
  <div class="detail-topbar">
    <button class="btn-back" onclick="goHome()">← Back</button>
    <div class="detail-col-name" id="detail-col-name"></div>

    </div>
  </div>
  <div class="detail-summary" id="detail-summary"></div>
  <div class="detail-content" id="detail-content"></div>
</div>

<div class="toast" id="toast"></div>

<script>

let currentUser = null;
let pinBuffer   = '';
let selectedAcc = null;
let currentDate = '';
let allHarvests = [];   // all harvests for selected date
let packState   = {};   // {harvest_id: {mix,peso,bugi,bills}}
let expState    = {};   // {collector: [{cat,desc,amt,id}]}
let savedSet    = new Set();
let activeCollector = null;

// ── UTILS ────────────────────────────────────────────────
function fmt(n){ return Math.round(Number(n||0)).toLocaleString('en-PH'); }
function today(){ return new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'}); }
function fmtDate(d){ return new Date(d+'T12:00:00').toLocaleDateString('en-PH',{weekday:'long',month:'long',day:'numeric',year:'numeric'}); }
function toast(msg,dur=2500){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),dur); }
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById('screen-'+id).classList.add('active'); }

async function sbFetch(path){
  const ctrl=new AbortController(), t=setTimeout(()=>ctrl.abort(),30000);
  const r=await fetch(`${SB}/rest/v1/${path}`,{headers:HDR,signal:ctrl.signal});
  clearTimeout(t); return r.json();
}
async function sbDelete(path){
  const ctrl=new AbortController(), t=setTimeout(()=>ctrl.abort(),15000);
  await fetch(`${SB}/rest/v1/${path}`,{method:'DELETE',headers:{...HDR,Prefer:'return=minimal'},signal:ctrl.signal});
  clearTimeout(t);
}

// ── PIN ──────────────────────────────────────────────────
async function loadAccounts(){
  try{
    const ctrl=new AbortController(), t=setTimeout(()=>ctrl.abort(),12000);
    const r=await fetch(`${SB}/rest/v1/office_accounts?active=eq.true&select=id,name,pin,role&order=name.asc`,{headers:HDR,signal:ctrl.signal});
    clearTimeout(t);
    const rows=await r.json();
    if(!Array.isArray(rows)) throw new Error();
    ACCOUNTS=rows.filter(a=>a.name!=='Gilbert').map(a=>({id:String(a.id),name:a.name,pin:a.pin||'0000',role:a.role||'Staff'}));
  }catch{
    ACCOUNTS=[{id:'2',name:'Ailyn',pin:'2274'},{id:'3',name:'Joi',pin:'3361'}];
  }
  document.getElementById('pin-accs').innerHTML=ACCOUNTS.map(a=>
    `<button class="acc-btn" data-id="${a.id}" onclick="selectAcc('${a.id}')">${a.name}</button>`
  ).join('');
}

function selectAcc(id){
  selectedAcc=ACCOUNTS.find(a=>a.id===id);
  pinBuffer=''; updateDots();
  document.getElementById('pin-err').textContent='';
  document.querySelectorAll('.acc-btn').forEach(b=>b.classList.toggle('sel',b.dataset.id===id));
}

function pinKey(k){
  if(!selectedAcc){document.getElementById('pin-err').textContent='Select your name first';return;}
  if(k==='del') pinBuffer=pinBuffer.slice(0,-1);
  else if(k==='clr') pinBuffer='';
  else if(pinBuffer.length<4) pinBuffer+=k;
  updateDots();
  document.getElementById('pin-err').textContent='';
  if(pinBuffer.length===4) setTimeout(checkPin,120);
}

function updateDots(){
  for(let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('filled',i<pinBuffer.length);
}

function checkPin(){
  if(pinBuffer===selectedAcc.pin){
    currentUser=selectedAcc;
    document.getElementById('user-chip').textContent='👤 '+currentUser.name;
    document.getElementById('user-chip').style.display='block';
    document.getElementById('btn-logout').style.display='block';
    document.getElementById('topbar-sub').textContent='Pack Counter · Office';
    showScreen('home');
    currentDate=today();
    loadHome();
  } else {
    document.getElementById('pin-err').textContent='Wrong PIN — try again';
    pinBuffer=''; updateDots();
  }
}

function doLogout(){
  currentUser=null; selectedAcc=null; pinBuffer='';
  allHarvests=[]; packState={}; expState={}; savedSet=new Set(); activeCollector=null;
  document.getElementById('user-chip').style.display='none';
  document.getElementById('btn-logout').style.display='none';
  document.getElementById('pin-err').textContent='';
  document.querySelectorAll('.acc-btn').forEach(b=>b.classList.remove('sel'));
  updateDots();
  showScreen('pin');
}

// ── HOME: COLLECTOR CARDS ────────────────────────────────
async function loadHome(){
  document.getElementById('home-date-display').textContent = fmtDate(currentDate);
  document.getElementById('date-picker').value = currentDate;
  const el=document.getElementById('collector-cards');
  el.innerHTML='<div class="loading"><div class="spinner"></div><span>Loading…</span></div>';
  packState={}; expState={}; savedSet=new Set(); allHarvests=[];

  try{
    // Load harvests
    const h=await sbFetch(`harvests?harvest_date=eq.${currentDate}&select=id,collector,vendo_name,tg_name,sheet_name,area,coins_total,net_collectible,spawn_share,harvested_at,vendo_id&order=collector.asc,harvested_at.asc`);
    if(!Array.isArray(h)){el.innerHTML='<div class="empty">Error loading data</div>';return;}
    allHarvests=h;

    if(!allHarvests.length){
      el.innerHTML=`<div class="no-harvest"><div class="icon">🌙</div>No harvests recorded<br>for this date</div>`;
      return;
    }

    // Fetch vendo codes separately (no FK defined so can't use join)
    const vendoIds=[...new Set(allHarvests.map(h=>h.vendo_id).filter(Boolean))];
    if(vendoIds.length){
      try{
        const vcRows=await sbFetch(`vendos?id=in.(${vendoIds.join(',')})&select=id,vendo_code`);
        if(Array.isArray(vcRows)){
          const vcMap={};
          vcRows.forEach(v=>{ vcMap[v.id]=v.vendo_code||''; });
          allHarvests=allHarvests.map(h=>({...h,_vendo_code:vcMap[h.vendo_id]||''}));
        }
      }catch{}
    }

    // Load pack items
    const p=await sbFetch(`harvest_pack_items?harvest_date=eq.${currentDate}&saved_by=eq.office&select=harvest_id,pack_type,amount`);
    if(Array.isArray(p)) p.forEach(pk=>{
      if(!packState[pk.harvest_id]) packState[pk.harvest_id]={mix:0,peso:0,bungkig:0,bugi:0,bills:0};
      if(pk.pack_type==='mix')   packState[pk.harvest_id].mix  =(packState[pk.harvest_id].mix||0)+Number(pk.amount)/1000;
      if(pk.pack_type==='peso')  packState[pk.harvest_id].peso =(packState[pk.harvest_id].peso||0)+Number(pk.amount)/300;
      if(pk.pack_type==='bungkig') packState[pk.harvest_id].bungkig=(packState[pk.harvest_id].bungkig||0)+Number(pk.amount);
      if(pk.pack_type==='bugi')  packState[pk.harvest_id].bugi =(packState[pk.harvest_id].bugi||0)+Number(pk.amount);
      if(pk.pack_type==='bills') packState[pk.harvest_id].bills=(packState[pk.harvest_id].bills||0)+Number(pk.amount);
      savedSet.add(pk.harvest_id);
    });

    // Load expenses
    const ex=await sbFetch(`collector_expenses?expense_date=eq.${currentDate}&select=id,collector,category,description,amount,receipt_photo_url&order=created_at.asc`);
    if(Array.isArray(ex)) ex.forEach(e=>{
      if(!expState[e.collector]) expState[e.collector]=[];
      expState[e.collector].push({id:e.id,cat:e.category,desc:e.description||'',amt:Number(e.amount),photo:e.receipt_photo_url||null});
    });

    renderCollectorCards();
  }catch(e){
    el.innerHTML='<div class="empty">Error: '+e.message+'</div>';
  }
}

async function renderCollectorCards(){
  // Group by collector
  const byCol={};
  allHarvests.forEach(h=>{
    if(!byCol[h.collector]) byCol[h.collector]=[];
    byCol[h.collector].push(h);
  });

  const html=Object.entries(byCol).map(([col,harvests])=>{
    const totalSpawn = harvests.reduce((s,h)=>s+Number(h.spawn_share||0),0);
    const totalCoins = harvests.reduce((s,h)=>s+Number(h.coins_total||0),0);
    const counted    = harvests.reduce((s,h)=>{ const ps=packState[h.id]; return s+(ps?calcCounted(ps):0); },0);
    const savedCount = harvests.filter(h=>savedSet.has(h.id)).length;
    const allSaved   = savedCount===harvests.length;
    const expTotal   = (expState[col]||[]).reduce((s,e)=>s+e.amt,0);
    const pct        = savedCount/harvests.length*100;
    const initials   = col.substring(0,2).toUpperCase();
    const gap        = counted>0 ? counted-totalSpawn : null;

    let gapBadge='';

    return `
    <div class="col-card ${allSaved?'done':''}" onclick="openCollector('${col}')">
      <div class="col-card-inner">
        <div class="col-avatar">${initials}</div>
        <div class="col-info">
          <div class="col-cname">${col}${gapBadge}</div>
          <div class="col-meta">
            <span>📦 ${harvests.length} vendos</span>
            <span>✓ ${savedCount}/${harvests.length} counted</span>
            ${expTotal>0?`<span>💸 ₱${fmt(expTotal)}</span>`:''}
          </div>
        </div>
        <div class="col-stats">
          <div class="col-spawn-lbl">Spawn Share</div>
          <div class="col-spawn">₱${fmt(totalSpawn)}</div>
          ${counted>0?`<div style="font-size:10px;color:var(--blue);font-weight:700;margin-top:2px">Counted ₱${fmt(counted)}</div>`:''}
        </div>
      </div>
      <div class="col-progress">
        <div class="col-progress-fill" style="width:${pct}%"></div>
      </div>
      <div style="padding:8px 12px 10px;border-top:1px solid #f3f4f6;display:flex;gap:8px" onclick="event.stopPropagation()">
        <button onclick="openCollector('${col}')" style="flex:1;padding:8px;border:1.5px solid #e5e7eb;border-radius:8px;background:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;color:#374151">
          📦 Count Packs
        </button>
        <button onclick="openEodSummary('${col}')" style="flex:1;padding:8px;border:none;border-radius:8px;background:#1e3cb8;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">
          📋 EOD Summary
        </button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('collector-cards').innerHTML=html;

  // Load reconciliation status badges
  try {
    const reconData = await sbFetch(`harvest_reconciliations?recon_date=eq.${currentDate}&select=collector,confirmed_at,confirmed_by`);
    if(Array.isArray(reconData)){
      reconData.forEach(r=>{
        const t = new Date(r.confirmed_at).toLocaleTimeString('en-PH',{timeZone:'Asia/Manila',hour:'2-digit',minute:'2-digit'});
        document.querySelectorAll('.col-card').forEach(card=>{
          if(card.getAttribute('onclick')===`openCollector('${r.collector}')`){
            const badge=document.createElement('div');
            badge.style.cssText='margin:4px 12px 8px;background:#f0fdf4;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;color:#15803d;text-align:center';
            badge.textContent='✅ Reconciled '+t;
            card.appendChild(badge);
          }
        });
      });
    }
  } catch(e){}
}

function toggleDatePicker(){
  const w=document.getElementById('date-inp-wrap');
  w.style.display=w.style.display==='block'?'none':'block';
}
function onDateChange(){
  currentDate=document.getElementById('date-picker').value;
  document.getElementById('date-inp-wrap').style.display='none';
  loadHome();
}

// ── DETAIL: VENDOS FOR COLLECTOR ─────────────────────────
async function openCollector(collector){
  activeCollector=collector;
  const harvests=allHarvests.filter(h=>h.collector===collector);
  document.getElementById('detail-col-name').textContent='👤 '+collector;
  renderDetailSummary(harvests);
  document.getElementById('detail-content').innerHTML=renderExpenseCard(collector)+harvests.map(h=>renderVendo(h)).join('');
  // Update prev/next button states
  const collectors=[...new Set(allHarvests.map(h=>h.collector))].filter(Boolean).sort();
  const idx=collectors.indexOf(collector);
  const prevBtn=document.getElementById('col-prev-btn');
  const nextBtn=document.getElementById('col-next-btn');
  if(prevBtn) prevBtn.style.opacity=idx>0?'1':'0.3';
  if(nextBtn) nextBtn.style.opacity=idx<collectors.length-1?'1':'0.3';
  showScreen('detail');
}

function navCollector(dir){
  const collectors=[...new Set(allHarvests.map(h=>h.collector))].filter(Boolean).sort();
  const idx=collectors.indexOf(activeCollector);
  const next=collectors[idx+dir];
  if(next) openCollector(next);
  else toast(dir>0?'Last collector':'First collector');
}

async function openEodSummary(collector){
  activeCollector=collector;
  showScreen('recon');
  await loadRecon(collector);
}

function goHome(){
  activeCollector=null;
  showScreen('home');
  renderCollectorCards(); // refresh cards with latest counts
}

function renderDetailSummary(harvests){
  const totalSpawn=harvests.reduce((s,h)=>s+Number(h.spawn_share||0),0);
  const totalCounted=harvests.reduce((s,h)=>{ const ps=packState[h.id]; return s+(ps?calcCounted(ps):0); },0);
  const saved=harvests.filter(h=>savedSet.has(h.id)).length;
  const collector=activeCollector||'';
  const totalExp=(expState[collector]||[]).reduce((s,e)=>s+e.amt,0);
  const netRemit=totalSpawn-totalExp;
  const _diff=totalCounted-netRemit;
  const _statusChip='<div class="ds-chip"><span class="ds-lbl">Status</span><span class="ds-val" style="color:var(--muted)">—</span></div>';
  document.getElementById('detail-summary').innerHTML=`
    <div class="ds-chip"><span class="ds-lbl">Spawn Share</span><span class="ds-val" style="color:var(--green)">₱${fmt(totalSpawn)}</span></div>
    <div class="ds-chip"><span class="ds-lbl" style="color:var(--red)">Expenses</span><span class="ds-val" style="color:${totalExp>0?'var(--red)':'var(--muted)'}">−₱${fmt(totalExp)}</span></div>
    <div class="ds-chip"><span class="ds-lbl" style="color:var(--blue)">Net Remit</span><span class="ds-val" style="color:var(--blue);font-size:16px">₱${fmt(netRemit)}</span></div>
    <div class="ds-chip"><span class="ds-lbl">Counted</span><span class="ds-val" style="color:${totalCounted>0?'var(--blue)':'var(--muted)'}">₱${fmt(totalCounted)}</span></div>
    ${_statusChip}
    <div class="ds-chip"><span class="ds-lbl">Saved</span><span class="ds-val" style="color:var(--muted);font-size:13px">${saved}/${harvests.length}</span></div>
  `;
}

// ── EXPENSE CARD ─────────────────────────────────────────
function renderExpenseCard(collector){
  const exps=expState[collector]||[];
  const total=exps.reduce((s,e)=>s+e.amt,0);
  const _harvs=allHarvests.filter(h=>h.collector===collector);
  const _spawn=_harvs.reduce((s,h)=>s+Number(h.spawn_share||0),0);
  const _netRemit=_spawn-total;
  return `
  <div class="exp-card" id="exp-card-${collector}">
    <div class="exp-hd" onclick="toggleExpPanel('${collector}')">
      <div class="exp-hd-title">💸 Expenses ${total>0?'· ₱'+fmt(total):''}</div>
      <div style="display:flex;align-items:center;gap:8px">
        ${total>0?`<div class="exp-hd-amt">₱${fmt(total)}</div>`:''}
        <span style="font-size:11px;color:var(--blue);font-weight:700">+ Add</span>
      </div>
    </div>
    <div class="exp-body" id="expbody-${collector}">
      <div id="explist-${collector}">${renderExpList(collector)}</div>
      <div class="exp-add-row">
        <select class="exp-select" id="expcat-${collector}">${EXP_CATS.map(c=>`<option>${c}</option>`).join('')}</select>
        <input class="exp-inp" id="expdesc-${collector}" placeholder="Description">
        <input class="exp-inp" id="expamt-${collector}" type="number" inputmode="decimal" placeholder="₱ Amount" style="max-width:100px">
        <button class="btn-add-exp" onclick="addExpense('${collector}')">Add</button>
      </div>
    </div>
  </div>
  ${total>0?`<div style='background:linear-gradient(135deg,#1e3cb8,#2B7BE8);border-radius:12px;padding:12px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center'><div><div style='font-size:10px;font-weight:800;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.08em'>Net to Remit</div><div style='font-size:11px;color:rgba(255,255,255,.6);margin-top:1px'>Spawn Share − Expenses</div></div><div style='text-align:right'><div style='font-size:26px;font-weight:900;color:#fff'>₱${fmt(_netRemit)}</div><div style='font-size:10px;color:rgba(255,255,255,.6)'>₱${fmt(_spawn)} − ₱${fmt(total)}</div></div></div>`:''}`;
}

function renderExpList(collector){
  const exps=expState[collector]||[];
  if(!exps.length) return '<div style="font-size:12px;color:var(--muted);padding:4px 0 8px">No expenses yet</div>';
  return exps.map((e,i)=>`
    <div class="exp-item" style="flex-wrap:wrap;gap:6px">
      <div class="exp-cat">${e.cat}</div>
      <div class="exp-desc">${e.desc||'—'}</div>
      <div class="exp-amt">₱${fmt(e.amt)}</div>
      <button class="exp-del" onclick="removeExpense('${collector}',${i})">✕</button>
      ${e.photo?`<div style="width:100%;margin-top:4px"><img src="${e.photo}" onclick="window.open('${e.photo}')" style="width:80px;height:60px;object-fit:cover;border-radius:6px;cursor:pointer;border:1px solid var(--border)"></div>`:'<div style="width:100%;font-size:10px;color:var(--red);margin-top:2px">⚠️ No receipt photo</div>'}
    </div>`).join('');
}

function toggleExpPanel(collector){
  document.getElementById('expbody-'+collector).classList.toggle('open');
}

async function addExpense(collector){
  const cat=document.getElementById('expcat-'+collector).value;
  const desc=document.getElementById('expdesc-'+collector).value.trim();
  const amt=parseFloat(document.getElementById('expamt-'+collector).value)||0;
  if(!amt){toast('Enter an amount');return;}
  try{
    const ctrl=new AbortController(), t=setTimeout(()=>ctrl.abort(),15000);
    const r=await fetch(`${SB}/rest/v1/harvest_expenses`,{
      method:'POST', headers:{...HDR,Prefer:'return=representation'},
      body:JSON.stringify({collector,expense_date:currentDate,category:cat,description:desc,amount:amt}),
      signal:ctrl.signal
    });
    clearTimeout(t);
    const rows=await r.json();
    const newId=Array.isArray(rows)&&rows[0]?rows[0].id:null;
    if(!expState[collector]) expState[collector]=[];
    expState[collector].push({id:newId,cat,desc,amt});
    document.getElementById('explist-'+collector).innerHTML=renderExpList(collector);
    document.getElementById('expdesc-'+collector).value='';
    document.getElementById('expamt-'+collector).value='';
    // Update header
    const total=(expState[collector]||[]).reduce((s,e)=>s+e.amt,0);
    const hd=document.querySelector(`#exp-card-${collector} .exp-hd-title`);
    if(hd) hd.textContent='💸 Expenses · ₱'+fmt(total);
    toast('✓ Expense saved');
  }catch(e){toast('Error: '+e.message);}
}

async function removeExpense(collector,idx){
  const e=expState[collector][idx];
  if(e&&e.id){
    try{ await sbDelete('collector_expenses?id=eq.'+e.id); }catch{}
  }
  expState[collector].splice(idx,1);
  document.getElementById('explist-'+collector).innerHTML=renderExpList(collector);
  toast('Removed');
}

function defStripHtml(hid,rec,cnt,isSaved,netTarget){
  const target=netTarget!==undefined?netTarget:rec;
  const gap=cnt>0?cnt-target:null;
  let chips='';
  if(cnt>0){
    chips+=`<span class="dchip spawn">Target ₱${fmt(target)}</span>`;
    chips+=`<span class="dchip counted">Counted ₱${fmt(cnt)}</span>`;

  } else {
    chips+=`<span class="dchip pending">Not counted yet</span>`;
  }
  chips+=`<button class="btn-save ${isSaved?'saved':''}" id="btnsave-${hid}" onclick="savePacks(${hid})">${isSaved?'✓ Saved':'Save'}</button>`;
  return chips;
}

// ── PACK INTERACTIONS ────────────────────────────────────
function calcCounted(ps){
  return ((ps.mix||0)*1000)+((ps.peso||0)*300)+(ps.bungkig||0)+(ps.bugi||0)+(ps.bills||0);
}

function suggestPacks(spawnShare){
  const s=Math.round(spawnShare);
  const mix=Math.floor(s/1000);
  const rem=s-(mix*1000);
  const peso=Math.floor(rem/300);
  const bugi=rem-(peso*300);
  const parts=[];
  if(mix)  parts.push(mix+'×₱1,000');
  if(peso) parts.push(peso+'×₱300');
  if(bugi) parts.push('Bugi ₱'+bugi);
  return parts.length?parts.join(' + '):'₱0 check harvest';
}

function targetPacksDetailed(harvestId, spawnShare){

  const ps = packState[harvestId];

    if(ps.peso) rows.push(`

        <span style="font-size:15px;font-weight:900;color:#7c3aed">₱${fmt(ps.peso*300)}</span>
      </div>`);
    if(ps.bugi) rows.push(`

      </div>`);
    return rows.join('');
  }
  // No harvest data yet — show calculated suggestion
  return suggestPacksDetailed(spawnShare);
}

function suggestPacksDetailed(spawnShare){
  const s=Math.round(spawnShare);
  const mix=Math.floor(s/1000);
  const rem=s-(mix*1000);
  const peso=Math.floor(rem/300);
  const bugi=rem-(peso*300);
  const rows=[];
  if(mix) rows.push(`
    <div style="display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:8px;padding:8px 12px;border:1px solid #86efac">
      <div>
        <span style="font-size:18px;font-weight:900;color:#1e3cb8">${mix}</span>
        <span style="font-size:13px;font-weight:700;color:#374151;margin-left:4px">pack${mix>1?'s':''} of ₱1,000</span>
      </div>
      <span style="font-size:15px;font-weight:900;color:#1e3cb8">₱${fmt(mix*1000)}</span>
    </div>`);
  if(peso) rows.push(`
    <div style="display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:8px;padding:8px 12px;border:1px solid #86efac">
      <div>
        <span style="font-size:18px;font-weight:900;color:#7c3aed">${peso}</span>
        <span style="font-size:13px;font-weight:700;color:#374151;margin-left:4px">pack${peso>1?'s':''} of ₱300</span>
      </div>
      <span style="font-size:15px;font-weight:900;color:#7c3aed">₱${fmt(peso*300)}</span>
    </div>`);
  if(bugi) rows.push(`
    <div style="display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:8px;padding:8px 12px;border:1px solid #86efac">
      <div>
        <span style="font-size:13px;font-weight:700;color:#374151">Bugi (loose coins)</span>
      </div>
      <span style="font-size:15px;font-weight:900;color:#0d9488">₱${bugi}</span>
    </div>`);
  // Bills are separate — show if any
  // (bills come from packState, not from suggested breakdown)
  // Add a bills row placeholder so counter knows to check
  rows.push(`
    <div style="display:flex;justify-content:space-between;align-items:center;background:#fff8f0;border-radius:8px;padding:8px 12px;border:1px solid #fed7aa">
      <div>
        <span style="font-size:13px;font-weight:700;color:#374151">Cash / Bills</span>
        <div style="font-size:10px;color:#9ca3af">Customer paid in bills — enter exact amount</div>
      </div>
      <span style="font-size:13px;font-weight:700;color:#d97706">+ any bills</span>
    </div>`);
  if(!rows.length) rows.push(`<div style="font-size:13px;color:#9ca3af;text-align:center">No packs needed</div>`);
  return rows.join('');
}

function adjPack(hid,type,delta){
  if(!packState[hid]) packState[hid]={mix:0,peso:0,bungkig:0,bugi:0,bills:0};
  packState[hid][type]=Math.max(0,(packState[hid][type]||0)+delta);
  const val=packState[hid][type];
  const mul=type==='mix'?1000:300;
  document.getElementById(type+'-cnt-'+hid).textContent=val;
  document.getElementById(type+'-tot-'+hid).textContent='₱'+fmt(val*mul);
  savedSet.delete(hid);
  refreshStrip(hid);
}

function onAmt(hid,type){
  if(!packState[hid]) packState[hid]={mix:0,peso:0,bungkig:0,bugi:0,bills:0};
  const val=parseFloat(document.getElementById(type+'-'+hid).value)||0;
  packState[hid][type]=val;
  const lbl=document.getElementById(type+'-lbl-'+hid);
  if(lbl) lbl.textContent=val?'₱'+fmt(val):'';
  savedSet.delete(hid);
  refreshStrip(hid);
}

function refreshStrip(hid){
  const ps=packState[hid]||{};
  const h=allHarvests.find(x=>x.id===hid);
  if(!h) return;
  const rec=Number(h.spawn_share||0);
  const cnt=calcCounted(ps);
  const _collExp=(expState[h.collector]||[]).reduce((s,e)=>s+e.amt,0);
  const netTarget=Math.max(0,rec-_collExp);
  const strip=document.getElementById('defstrip-'+hid);
  if(strip) strip.innerHTML=defStripHtml(hid,rec,cnt,savedSet.has(hid),netTarget);
  // Update detail summary
  if(activeCollector){
    const harvests=allHarvests.filter(h=>h.collector===activeCollector);
    renderDetailSummary(harvests);
  }
}

// ── SAVE ─────────────────────────────────────────────────
async function savePacks(hid){
  const ps=packState[hid]||{mix:0,peso:0,bungkig:0,bugi:0,bills:0};
  const h=allHarvests.find(x=>x.id===hid);
  if(!h) return;
  const btn=document.getElementById('btnsave-'+hid);
  if(btn){btn.disabled=true;btn.textContent='…';}

  // Check deficit/surplus vs netTarget (spawn share minus expenses)
  const _rec=Number(h.spawn_share||0);
  const _collExp=expState[h.collector]||[];
  const _totalExp=_collExp.reduce((s,e)=>s+e.amt,0);
  const _netTarget=Math.max(0,_rec-_totalExp);
  const _cnt=calcCounted(ps);
  let _packNote='';
  if(_cnt>0 && _cnt!==_netTarget){
    const _gap=_cnt-_netTarget;
    const _type=_gap>0?'surplus':'deficit';
    const _result = await showModal(_type,_gap,_cnt,_netTarget,_collExp);
    if(_result===false){
      if(btn){btn.disabled=false;btn.textContent='Save';btn.classList.remove('saved');}
      return;
    }
    if(typeof _result==='string') _packNote=_result;
  }

  try{
    await sbDelete('harvest_pack_items?harvest_id=eq.'+hid+'&saved_by=eq.office');
    const base={harvest_id:hid,vendo_id:h.vendo_id||null,collector:h.collector,harvest_date:currentDate,saved_by:'office',note:_packNote||null};
    const rows=[];
    if((ps.mix||0)>0)      rows.push({...base,pack_type:'mix',     amount:ps.mix*1000});
    if((ps.peso||0)>0)     rows.push({...base,pack_type:'peso',    amount:ps.peso*300});
    if((ps.bungkig||0)>0)  rows.push({...base,pack_type:'bungkig', amount:ps.bungkig});
    if((ps.bugi||0)>0)     rows.push({...base,pack_type:'bugi',    amount:ps.bugi});
    if((ps.bills||0)>0)    rows.push({...base,pack_type:'bills',   amount:ps.bills});

    if(rows.length>0){
      const ctrl=new AbortController(), t=setTimeout(()=>ctrl.abort(),15000);
      const r=await fetch(`${SB}/rest/v1/harvest_pack_items`,{
        method:'POST',headers:{...HDR,Prefer:'return=minimal'},
        body:JSON.stringify(rows),signal:ctrl.signal
      });
      clearTimeout(t);
      if(!r.ok) throw new Error('HTTP '+r.status);
    }

    savedSet.add(hid);
    if(btn){btn.disabled=false;btn.textContent='✓ Saved';btn.classList.add('saved');}
    refreshStrip(hid);
    toast('✓ Saved — '+(h.vendo_name||h.tg_name||'Vendo'));

    // Check if ALL vendos for this collector are now saved → prompt to reconcile
    const colHarvests = allHarvests.filter(x=>x.collector===h.collector);
    const allSaved = colHarvests.every(x=>savedSet.has(x.id));
    if(allSaved && colHarvests.length > 0){
      setTimeout(()=>showReconPrompt(h.collector, colHarvests.length), 500);
    }
  }catch(e){
    toast('Error: '+e.message);
    if(btn){btn.disabled=false;btn.textContent='Retry';btn.classList.remove('saved');}
  }
}

// ── CUSTOM MODAL ─────────────────────────────────────────
let _modalResolve = null;
function showModal(type, gap, counted, rec, expenses) {
  const overlay = document.getElementById('modal-overlay');
  const isSurplus = type === 'surplus';
  const shortAmt = Math.abs(gap);
  const totalExp = (expenses||[]).reduce((s,e)=>s+e.amt,0);
  const coveredByExp = !isSurplus && totalExp > 0 && shortAmt <= totalExp;
  document.getElementById('modal-icon').textContent = isSurplus ? '⚠️' : (coveredByExp ? '✅' : '🔴');
  document.getElementById('modal-title').textContent = isSurplus
    ? `SURPLUS of ₱${fmt(shortAmt)}`
    : `SHORT by ₱${fmt(shortAmt)}`;
  document.getElementById('modal-msg').innerHTML = isSurplus
    ? `Counted <strong>₱${fmt(counted)}</strong> exceeds Spawn Share <strong>₱${fmt(rec)}</strong>.<br><br>Check your pack count before saving.`
    : `Counted <strong>₱${fmt(counted)}</strong> is less than Net to Remit <strong>₱${fmt(rec)}</strong>.`;
  // Expense auto-note
  const expNote = document.getElementById('modal-exp-note');
  if(coveredByExp){
    expNote.style.display='block';
    expNote.textContent = `✓ Short of ₱${fmt(shortAmt)} is covered by expenses (₱${fmt(totalExp)} total)`;
  } else if(!isSurplus && totalExp>0){
    expNote.style.display='block';
    expNote.style.background='#fefce8'; expNote.style.borderColor='#fde047'; expNote.style.color='#854d0e';
    expNote.textContent = `⚠️ Expenses cover ₱${fmt(totalExp)} but short is ₱${fmt(shortAmt)}`;
  } else {
    expNote.style.display='none';
  }
  // Reset note
  document.getElementById('modal-note-inp').value = coveredByExp ? `Short covered by expenses (₱${fmt(totalExp)})` : '';
  const btn = document.getElementById('modal-confirm-btn');
  btn.className = 'modal-btn confirm ' + (isSurplus ? 'surplus' : 'deficit');
  overlay.style.display = 'flex';
  return new Promise(resolve => { _modalResolve = resolve; });
}
function modalConfirm() {
  const note = document.getElementById('modal-note-inp').value.trim();
  document.getElementById('modal-overlay').style.display = 'none';
  if (_modalResolve) { _modalResolve(note||true); _modalResolve = null; }
}
function modalCancel() {
  document.getElementById('modal-overlay').style.display = 'none';
  if (_modalResolve) { _modalResolve(false); _modalResolve = null; }
}


// ── RECONCILIATION ───────────────────────────────────────
async function loadRecon(collector){
  const date = document.getElementById('date-picker').value || new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
  const dateLabel = new Date(date+'T12:00:00').toLocaleDateString('en-PH',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

  document.getElementById('recon-col-name').textContent = '👤 '+collector;
  document.getElementById('recon-date').textContent = dateLabel;
  document.getElementById('recon-vendo-list').innerHTML = '<div style="text-align:center;padding:24px;color:#9ca3af;font-size:13px"><span style="display:inline-block;width:20px;height:20px;border:2px solid #e5e7eb;border-top-color:#1e3cb8;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px"></span>Loading…</div>';

  try {
    const [hR, pR, eR, rR] = await Promise.all([
      sbFetch(`harvests?collector=eq.${encodeURIComponent(collector)}&harvest_date=eq.${date}&select=id,vendo_name,sheet_name,area,coins_total,net_collectible,spawn_share,harvested_at`),
      sbFetch(`harvest_pack_items?collector=eq.${encodeURIComponent(collector)}&harvest_date=eq.${date}&saved_by=eq.office&select=harvest_id,pack_type,amount`),
      sbFetch(`collector_expenses?collector=eq.${encodeURIComponent(collector)}&expense_date=eq.${date}&select=id,category,description,amount`),
      sbFetch(`harvest_reconciliations?collector=eq.${encodeURIComponent(collector)}&recon_date=eq.${date}&select=id,confirmed_at,confirmed_by&limit=1`)
    ]);

    const harvests = Array.isArray(hR) ? hR : [];
    const packs    = Array.isArray(pR) ? pR : [];
    const expenses = Array.isArray(eR) ? eR : [];
    const existing = Array.isArray(rR) && rR.length > 0 ? rR[0] : null;

    // Build pack map
    const packMap = {};
    packs.forEach(p => {
      if(!packMap[p.harvest_id]) packMap[p.harvest_id]={mix:0,peso:0,bungkig:0,bugi:0,bills:0};
      packMap[p.harvest_id][p.pack_type] = (packMap[p.harvest_id][p.pack_type]||0) + Number(p.amount||0);
    });

    const totalSpawn = harvests.reduce((s,h)=>s+parseFloat(h.spawn_share||0),0);
    const totalExp   = expenses.reduce((s,e)=>s+Number(e.amount||0),0);
    const netRemit   = totalSpawn - totalExp;

    // Update header stats
    document.getElementById('recon-vendos').textContent = harvests.length;
    document.getElementById('recon-spawn-total').textContent = '₱'+fmt(totalSpawn);
    document.getElementById('recon-net').textContent = '₱'+fmt(netRemit);
    document.getElementById('recon-spawn-sum').textContent = '₱'+fmt(totalSpawn);
    document.getElementById('recon-net-big').textContent = '₱'+fmt(netRemit);
    const expRow = document.getElementById('recon-exp-row');
    if(totalExp > 0){ expRow.style.display='flex'; document.getElementById('recon-exp-sum').textContent='−₱'+fmt(totalExp); }
    else expRow.style.display='none';

    // Render vendos
    const PACK_LABELS = {mix:'₱1,000',peso:'₱300',bungkig:'Bungkig',bugi:'Bugi',bills:'Cash'};
    const PACK_COLORS = {mix:'#1e3cb8',peso:'#7c3aed',bungkig:'#0d9488',bugi:'#b45309',bills:'#d97706'};
    document.getElementById('recon-vendo-list').innerHTML = harvests.length
      ? harvests.map(h => {
          const pm = packMap[h.id]||{};
          const packed = Object.values(pm).reduce((s,v)=>s+v,0);
          const spawn  = parseFloat(h.spawn_share||0);
          const gap    = packed > 0 ? packed - spawn : null;
          const hasPacks = packed > 0;
          const cls    = !hasPacks ? 'uncounted' : gap===0 ? 'match' : gap < 0 ? 'short' : 'surplus';
          const statusText = !hasPacks ? '⏳ Not counted' : gap===0 ? '✓ Match' : gap<0 ? `Short ₱${fmt(Math.abs(gap))}` : `Surplus ₱${fmt(gap)}`;
          const packParts = Object.entries(pm).filter(([,v])=>v>0).map(([k,v])=>
            `<span style="color:${PACK_COLORS[k]};font-weight:700">${k==='mix'?Math.round(v/1000)+'×₱1k':k==='peso'?Math.round(v/300)+'×₱300':PACK_LABELS[k]+' ₱'+fmt(v)}</span>`
          ).join(' · ');
          const t = h.harvested_at ? new Date(h.harvested_at).toLocaleTimeString('en-PH',{timeZone:'Asia/Manila',hour:'2-digit',minute:'2-digit'}) : '';
          return `<div class="recon-vendo ${cls}">
            <div class="rv-top">
              <div>
                <span class="rv-code">${h.vendo_code||(h.sheet_name?(h.sheet_name.substring(0,4).toUpperCase()):'—')}</span>
                <span class="rv-name">${h.vendo_name||h.sheet_name||'—'}</span>
              </div>
              <span class="rv-time">${t}</span>
            </div>
            <div class="rv-coins">📍 ${h.area||'—'} · Coins ₱${fmt(h.coins_total)}</div>
            <div class="rv-packs">${packParts||'<span style="color:#9ca3af;font-style:italic">No packs entered in Spawn Count</span>'}</div>
            <div class="rv-bottom">
              <span class="rv-spawn">Spawn ₱${fmt(spawn)}</span>
              <span class="rv-status ${cls}">${statusText}</span>
            </div>
          </div>`;
        }).join('')
      : '<div style="text-align:center;padding:24px;color:#9ca3af;font-size:13px">No harvests for this date</div>';

    // Render expenses
    const catIcons = {Fuel:'⛽',Food:'🍱',Repair:'🔧',Parking:'🅿️',Load:'📱',Other:'📝'};
    document.getElementById('recon-expense-list').innerHTML = expenses.length
      ? expenses.map(e=>`<div class="recon-exp-row">
          <span>${catIcons[e.category]||'📝'} ${e.category}${e.description?' · '+e.description:''}</span>
          <span style="font-weight:700;color:#dc2626">−₱${fmt(e.amount)}</span>
        </div>`).join('')
      : '<div style="font-size:12px;color:#9ca3af;text-align:center;padding:6px 0">No expenses</div>';

    // Check if already reconciled
    const banner = document.getElementById('recon-status-banner');
    const btn = document.getElementById('btn-reconcile');
    if(existing){
      const t = new Date(existing.confirmed_at).toLocaleString('en-PH',{timeZone:'Asia/Manila',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
      banner.style.display='block';
      document.getElementById('recon-confirmed-text').textContent='✅ Reconciled on '+t;
      document.getElementById('recon-confirmed-by').textContent='Confirmed by '+existing.confirmed_by;
      btn.textContent='✅ Already Reconciled — Re-confirm';
      btn.classList.add('done');
    } else {
      banner.style.display='none';
      btn.textContent='✅ Reconcile & Confirm';
      btn.classList.remove('done');
    }

    // Store for reconcile
    window._reconData = { collector, date, totalSpawn, totalExp, netRemit, vendoCount: harvests.length };

  } catch(e) {
    document.getElementById('recon-vendo-list').innerHTML='<div style="text-align:center;padding:24px;color:#dc2626;font-size:13px">Error: '+e.message+'</div>';
  }
}

async function doReconcile(){
  const d = window._reconData;
  if(!d) return;
  const btn = document.getElementById('btn-reconcile');
  btn.disabled=true; btn.textContent='Saving…';

  try {
    // Check if harvest_reconciliations table exists, insert reconciliation record
    const r = await fetch(`${SB}/rest/v1/harvest_reconciliations`,{
      method:'POST',
      headers:{...HDR,Prefer:'return=minimal'},
      body:JSON.stringify({
        collector: d.collector,
        recon_date: d.date,
        confirmed_by: currentUser?.name||'Admin',
        confirmed_at: new Date().toISOString(),
        spawn_share: d.totalSpawn,
        expenses: d.totalExp,
        net_to_remit: d.netRemit,
        vendo_count: d.vendoCount
      })
    });
    if(!r.ok && r.status !== 409) throw new Error('HTTP '+r.status);
    const t = new Date().toLocaleString('en-PH',{timeZone:'Asia/Manila',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    const banner = document.getElementById('recon-status-banner');
    banner.style.display='block';
    document.getElementById('recon-confirmed-text').textContent='✅ Reconciled on '+t;
    document.getElementById('recon-confirmed-by').textContent='Confirmed by '+(currentUser?.name||'Admin');
    btn.disabled=false; btn.textContent='✅ Already Reconciled — Re-confirm'; btn.classList.add('done');
    toast('✅ Reconciled — '+d.collector+' ₱'+fmt(d.netRemit));
    // Refresh collector cards
    renderCollectorCards();
    // Show receipt
    showReconReceipt(d);
  } catch(e){
    toast('Error: '+e.message);
    btn.disabled=false; btn.textContent='✅ Reconcile & Confirm'; btn.classList.remove('done');
  }
}

// ── RECON RECEIPT ────────────────────────────────────────
function showReconReceipt(d){
  const now = new Date().toLocaleString('en-PH',{timeZone:'Asia/Manila',weekday:'short',year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  const refNo = 'RC-'+d.collector.substring(0,2).toUpperCase()+'-'+Date.now().toString().slice(-6);
  const hasExp = d.totalExp > 0;
  const overlay = document.createElement('div');
  overlay.id = 'recon-receipt-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:20px;width:100%;max-width:360px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4)">
      <!-- Header -->
      <div style="background:linear-gradient(135deg,#15803d,#16a34a);padding:20px 20px 16px;text-align:center;color:#fff">
        <div style="font-size:11px;font-weight:700;letter-spacing:.1em;opacity:.8;margin-bottom:4px">SPAWN INTERNETAN</div>
        <div style="font-size:18px;font-weight:900">COLLECTION RECEIPT</div>
        <div style="font-size:11px;opacity:.75;margin-top:4px">${now}</div>
      </div>
      <!-- Stamp -->
      <div style="background:#f0fdf4;border-bottom:2px dashed #86efac;padding:14px;text-align:center">
        <div style="display:inline-block;border:3px solid #15803d;border-radius:10px;padding:6px 20px">
          <div style="font-size:20px;font-weight:900;color:#15803d;letter-spacing:.05em">✓ CLEARED</div>
          <div style="font-size:11px;font-weight:700;color:#16a34a">NO SHORT · FULLY REMITTED</div>
        </div>
      </div>
      <!-- Details -->
      <div style="padding:16px 20px">
        <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f3f4f6;font-size:13px">
          <span style="color:#6b7280">Collector</span>
          <span style="font-weight:800;color:#111">${d.collector}</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f3f4f6;font-size:13px">
          <span style="color:#6b7280">Date</span>
          <span style="font-weight:700;color:#111">${d.date}</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f3f4f6;font-size:13px">
          <span style="color:#6b7280">Vendos</span>
          <span style="font-weight:700;color:#111">${d.vendoCount} machine${d.vendoCount>1?'s':''}</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f3f4f6;font-size:13px">
          <span style="color:#6b7280">Spawn Share</span>
          <span style="font-weight:700;color:#111">₱${fmt(d.totalSpawn)}</span>
        </div>
        ${hasExp?`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f3f4f6;font-size:13px">
          <span style="color:#ef4444">Expenses</span>
          <span style="font-weight:700;color:#ef4444">−₱${fmt(d.totalExp)}</span>
        </div>`:''}
        <div style="display:flex;justify-content:space-between;padding:10px 0 4px;font-size:15px">
          <span style="font-weight:800;color:#1e3cb8">NET REMITTED</span>
          <span style="font-weight:900;color:#1e3cb8">₱${fmt(d.netRemit)}</span>
        </div>
      </div>
      <!-- Ref + Close -->
      <div style="padding:0 20px 20px">
        <div style="background:#f9fafb;border-radius:8px;padding:8px 12px;text-align:center;margin-bottom:12px">
          <div style="font-size:10px;color:#9ca3af;font-weight:700">REFERENCE NO.</div>
          <div style="font-size:13px;font-weight:800;color:#374151;letter-spacing:.05em">${refNo}</div>
        </div>
        <button onclick="document.getElementById('recon-receipt-overlay').remove()" style="width:100%;padding:13px;background:#1e3cb8;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit">Close</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.remove(); });
}

// ── INIT ─────────────────────────────────────────────────
loadAccounts();
